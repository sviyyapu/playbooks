---
- name: Create Red Hat case and upload sosreport
  hosts: localhost
  gather_facts: no
  vars:
    rh_user: "viyyapurisandeep"
    rh_password: 
    case_summary: "RHEL server issue"
    case_description: "System experiencing performance issues"
    product: "Red Hat Enterprise Linux"
    version: "9.4"
    sos_file: "/var/tmp/sosreport-*.tar.xz"
  tasks:
    - name: Get Red Hat API access token
      uri:
        url: https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: "refresh_token" 
          client_id: "rhsm-api"
          username: "{{ rh_user }}"
          password: "{{ rh_password }}"
        return_content: yes
      register: token_response

    - name: Store token
      set_fact:
        access_token: "{{ token_response.json.access_token }}"

    - name: Create support case
      uri:
        url: https://api.access.redhat.com/support/v1/cases
        method: POST
        headers:
           Authorization: "Bearer {{ access_token }}"
           Content-Type: "application/json"
        body_format: json
        body:
           product: "{{ product }}"
           version: "{{ version }}"
           severity: "3"
           summary: "{{ case_summary }}"
           description: "{{ case_description }}"
           status_code: 201
        return_content: yes
      register: case_response



    - name: Save case number
      set_fact:
        case_number: "{{ case_response.json.case_number }}"

    - name: Display case number
      debug:
        msg: "Created case {{ case_number }}"

    - name: Request upload location
      uri:
        url: "https://api.access.redhat.com/support/v1/cases/{{ case_number }}/attachments"
        method: POST
        headers:
           Authorization: "Bearer {{ access_token }}"
           Content-Type: "application/json"
        body_format: json
        body:
          file_name: "{{ sos_file | basename }}"

        return_content: yes
      register: upload_info



    - name: Upload sosreport
      command: >
        curl -k
        -F "file=@{{ sos_file }}"
        "{{ upload_info.json.upload_url }}"
      register: upload_result


    - name: Show upload result
      debug:
        var: upload_result.stdout
