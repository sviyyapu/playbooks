---
# Tasks to create a compressed archive of the API dumps and prepare for rh_case role

- name: Archive | Ensure necessary setup facts are gathered
  ansible.builtin.setup:
    filter:
      - ansible_fqdn
      - ansible_date_time
  delegate_to: localhost
  run_once: true

- name: Archive | Set fact for the archive name
  ansible.builtin.set_fact:
    __aap_api_gather_archive_name: >-
      {{ ('aap-api-gather-' ~ inventory_hostname | lower | regex_replace('[^a-zA-Z0-9_-]', '-')
         ~ '-' ~ ansible_date_time.date
         ~ '-' ~ (ansible_date_time.time | replace(':', ''))
         ~ '.tar.gz') | regex_replace('[^a-zA-Z0-9._-]', '-') }}
  delegate_to: localhost
  run_once: true

- name: Archive | Set fact for the source directory path
  ansible.builtin.set_fact:
    __aap_api_gather_source_path: "{{ aap_api_gather_dest }}/{{ inventory_hostname }}"
  delegate_to: localhost
  run_once: true

- name: Archive | Verify source directory exists and has content
  ansible.builtin.stat:
    path: "{{ __aap_api_gather_source_path }}"
  register: __aap_api_gather_source_stat
  delegate_to: localhost
  run_once: true

- name: Archive | Create a compressed archive of the API gather directory # noqa: var-naming[no-role-prefix]
  community.general.archive:
    path: "{{ __aap_api_gather_source_path }}"
    dest: "{{ aap_api_gather_dest }}/{{ __aap_api_gather_archive_name }}"
    format: gz
    mode: "0644"
  when:
    - __aap_api_gather_source_stat.stat.exists
    - __aap_api_gather_source_stat.stat.isdir
  delegate_to: localhost
  run_once: true
  register: __archive_result

- name: Archive | Add API gather archive path to case_updates_needed  # noqa: var-naming[no-role-prefix]
  # Note: Only the current archive (just created) is added to case_updates_needed.
  # Old archives from previous runs are NOT automatically included.
  when:
    - __aap_api_gather_source_stat.stat.exists
    - __aap_api_gather_source_stat.stat.isdir
    - __archive_result is defined
    - __archive_result.changed | default(false) or __archive_result.archived is defined
  ansible.builtin.set_fact:
    case_updates_needed: >-
      {{ case_updates_needed | default([]) +
      [{
        'attachment': aap_api_gather_dest ~ '/' ~ __aap_api_gather_archive_name,
        'attachmentDescription': (
          "Ansible Automation Platform API gather collected using the 'infra.support_assist' collection. "
          ~ "Components queried: " ~ (aap_api_gather_components | join(', '))
        )
      }] }}
  delegate_to: localhost
  run_once: true
...
