---
- name: "Gather APIs | Component Loop | Ensure destination directory exists for {{ component_name }}"
  ansible.builtin.file:
    path: "{{ __component_dest_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost # Files are saved on the control node

- name: "{{ __task_name }}"
  vars:
    __task_name: "Gather APIs | Component Loop | Loop through {{ component_name }} API endpoints"
    # Handle both string and dict endpoint formats
    # If endpoint is a dict, extract path and config; if string, use as-is
    __endpoint_config: "{{ endpoint_path if endpoint_path is mapping else {'path': endpoint_path} }}"
    __endpoint_path: "{{ __endpoint_config.path }}"
    # Get max_pages from endpoint config, or fall back to defaults
    __max_pages: >-
      {{
        __endpoint_config.max_pages | default(
          (aap_api_gather__max_pages | default({}))['default'] | default(20)
        ) if aap_api_gather_enforce__max_pages | default(true) | bool
        else 0
      }}
    # Get query_params from endpoint config, or from global query_params dict, or empty
    __endpoint_query_params: >-
      {{
        __endpoint_config.query_params | default(
          (aap_api_gather_query_params | default({}))[__endpoint_path] | default('')
        ) if aap_api_gather_use_query_params | default(true) | bool
        else ''
      }}
    # Build URL with query parameters
    __endpoint_with_params: "{{ __endpoint_path + ('?' + __endpoint_query_params if __endpoint_query_params != '' else '') }}"
    __full_url: "{{ __base_url }}{{ __endpoint_with_params }}"
    # Create a safe filename from the endpoint path (use original path, not with params)
    # Replace "/" with "_" and remove leading "/" if present
    __safe_filename: >-
      {{
        (
          (
            __endpoint_path | regex_replace('^/', '') | replace('/', '_')
            | replace('?', '_') | replace('&', '_') | replace('=', '_')
          ) | default('index')
        ) ~ '.json'
      }}
    __output_file_path: "{{ __component_dest_dir }}/{{ __safe_filename }}"
  loop: "{{ __endpoints }}"
  loop_control:
    loop_var: endpoint_path
    label: "{{ __base_url }}{{ endpoint_path if endpoint_path is string else endpoint_path.path }}"
  ansible.builtin.include_tasks: gather_apis_endpoint_loop.yml
...
