---
# Recursive task file for handling pagination
# This file is included recursively until all pages are fetched

- name: Gather APIs | Pagination | Query endpoint page {{ __current_page }} # noqa: var-naming[no-role-prefix]
  ansible.builtin.uri:
    url: "{{ __next_url }}"
    method: GET
    headers:
      Authorization: "Bearer {{ aap_api_gather_aap_token.token | default(aap_api_gather_aap_token) }}"
      Accept: "application/json"
    return_content: true
    validate_certs: "{{ aap_api_gather_aap_validate_certs }}"
    status_code: 200 # Expect success
    # Increase timeout if needed for slow endpoints
    # timeout: 60
  register: __api_result
  ignore_errors: true # Continue if one endpoint fails
  failed_when: false # Never fail, always continue

- name: Gather APIs | Pagination | Handle successful response
  when: __api_result is defined and __api_result.status is defined and __api_result.status == 200 and __api_result.content is defined
  block:
    - name: Gather APIs | Pagination | Save output for page {{ __current_page }}
      ansible.builtin.copy:
        content: "{{ __api_result.json | to_nice_json }}"
        dest: "{{ __component_dest_dir }}/{{ __safe_filename | default('unknown') | regex_replace('\\.json$', '') }}_page{{ __current_page }}.json"
        mode: '0644'
      delegate_to: localhost # Save on control node

    - name: Gather APIs | Pagination | Check for next page and prepare variables
      when: __api_result.json is defined
      vars:
        __next_url_raw: "{{ __api_result.json.next | default('') }}"
        __has_next_page: "{{ __api_result.json.next is defined and __api_result.json.next is not none and __api_result.json.next != '' }}"
        __max_pages_reached: "{{ ((__max_pages | int) > 0) and ((__current_page | int) >= (__max_pages | int)) }}"
        __next_url: >-
          {{
            (__base_url + __next_url_raw)
            if __has_next_page and not (__next_url_raw | regex_search('^https?://'))
            else (__next_url_raw if (__has_next_page | bool) else '')
          }}
      ansible.builtin.set_fact:
        __has_next_page: "{{ __has_next_page }}"
        __max_pages_reached: "{{ __max_pages_reached }}"
        __next_url: "{{ __next_url }}"

    - name: Gather APIs | Pagination | Log max pages limit reached
      ansible.builtin.debug:
        msg: "Reached maximum page limit ({{ __max_pages }}) for this endpoint. Stopping pagination."
      when: __max_pages_reached | bool

    - name: Gather APIs | Pagination | Fetch next page if available and within limits
      when: __has_next_page | bool and not (__max_pages_reached | bool)
      block:
        - name: Gather APIs | Pagination | Increment page number
          ansible.builtin.set_fact:
            __current_page: "{{ __current_page | int + 1 }}"

        - name: Gather APIs | Pagination | Recursively fetch next page
          ansible.builtin.include_tasks: gather_apis_pagination.yml

- name: Gather APIs | Pagination | Handle failed response
  when: __api_result is not defined or __api_result.status is not defined or __api_result.status != 200
  block:
    - name: Gather APIs | Pagination | Register failure and log warning
      vars:
        __pagination_failure_entry:
          component: "{{ component_name }}"
          endpoint: "{{ endpoint_path }}"
          url: "{{ __next_url }}"
          status_code: >-
            {{ __api_result.status | default('N/A') if __api_result is defined else 'N/A' }}
          error_message: >-
            {{
              (__api_result.msg | default(
                __api_result.body | default(
                  __api_result.json | default({}) | to_json | default('Unknown error')
                )
              )) if __api_result is defined else 'Request failed - no response received'
            }}
          page: "{{ __current_page }}"
      ansible.builtin.set_fact:
        aap_api_gather_failures: "{{ aap_api_gather_failures | default([]) + [__pagination_failure_entry] }}"
      run_once: true

    - name: Gather APIs | Pagination | Log warning
      ansible.builtin.debug:
        msg: >-
          Warning: Failed to query {{ __next_url }} (page {{ __current_page }}).
          Status:
          {{ __api_result.status | default('N/A') if __api_result is defined else 'N/A' }}.
          Error:
          {{
            (__api_result.msg | default(
              __api_result.body | default(
                __api_result.json | default({}) | to_json | default('Unknown error')
              )
            )) if __api_result is defined else 'Request failed - no response received'
          }}
...
