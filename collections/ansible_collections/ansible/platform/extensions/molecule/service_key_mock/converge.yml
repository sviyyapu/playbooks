  connection: ansible.platform.http
  gather_facts: false
  vars:
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false
    ansible_platform_use_persistent_connection: false
  tasks:
    - name: Create service_key (http direct)
      ansible.platform.service_key:
        name: "molecule-mock-svckey-local-hd"
        is_active: true
      register: create_result_http_direct

    - name: Assert create changed (http direct)
      ansible.builtin.assert:
        that: create_result_http_direct is changed
        fail_msg: "Create (http direct) should report changed."

    - name: Run again idempotency (http direct)
      ansible.platform.service_key:
        name: "molecule-mock-svckey-local-hd"
        is_active: true
        state: present
      register: idem_result_http_direct

    - name: Assert idempotent run did not change (http direct)
      ansible.builtin.assert:
        that: idem_result_http_direct is not changed
        fail_msg: "Idempotent run (http direct) should not report changed."

    - name: Update service_key (http direct)
      ansible.platform.service_key:
        name: "molecule-mock-svckey-local-hd"
        is_active: false
      register: update_result_http_direct

    - name: Assert update changed (http direct)
      ansible.builtin.assert:
        that: update_result_http_direct is changed
        fail_msg: "Update (http direct) should report changed."

