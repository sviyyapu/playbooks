---
- name: Cleanup — delete application
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false
  tasks:
    - name: Delete application
      ansible.platform.application:
        name: "molecule-mock-app"
        organization: "Default"
        state: absent
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: delete_result
      failed_when: false
      vars:
        ansible_connection: local

    - name: Assert application removed
      ansible.builtin.assert:
        that: delete_result is not failed
        fail_msg: "Cleanup: failed to delete application."
      vars:
        ansible_connection: local

    - name: Remove manager survive flag (signals manager to shut down)
      ansible.builtin.file:
        path: /tmp/ap/.survive
        state: absent
      vars:
        ansible_connection: local

