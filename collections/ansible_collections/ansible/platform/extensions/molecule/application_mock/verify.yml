---
- name: Verify — application created and updated
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false
  tasks:
    - name: Check application exists
      ansible.platform.application:
        name: "molecule-mock-app"
        organization: "Default"
        state: exists
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: exists_result
      vars:
        ansible_connection: local

    - name: Assert application was found
      ansible.builtin.assert:
        that:
          - exists_result is not failed
          - exists_result.get('exists') | default(false) | bool
        fail_msg: "Verify: application molecule-mock-app not found."
      vars:
        ansible_connection: local

    - name: Assert description was updated
      ansible.builtin.assert:
        that: exists_result.get('application', {}).get('description') == "Updated by Molecule"
        fail_msg: "Verify: application description was not updated. Got: {{ exists_result.get('application', {}).get('description') }}"
      vars:
        ansible_connection: local

