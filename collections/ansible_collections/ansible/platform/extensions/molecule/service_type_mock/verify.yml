---
- name: Verify — service_type created (connection local)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false
  tasks:
    - name: Get service_type (state exists, connection local)
      ansible.platform.service_type:
        name: "molecule-mock-svctype-local"
        state: exists
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: exists_result
      vars:
        ansible_connection: local

    - name: Assert service_type was found (connection local)
      ansible.builtin.assert:
        that:
          - exists_result is not failed
          - exists_result.get('exists') | default(false) | bool
        fail_msg: "Verify: service_type not found (connection local)."
      vars:
        ansible_connection: local

- name: Verify — service_type created (http direct)
  hosts: localhost
  connection: ansible.platform.http
  gather_facts: false
  vars:
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false
    ansible_platform_use_persistent_connection: false
  tasks:
    - name: Get service_type (state exists, http direct)
      ansible.platform.service_type:
        name: "molecule-mock-svctype-local-hd"
        state: exists
      register: exists_result

    - name: Assert service_type was found (http direct)
      ansible.builtin.assert:
        that:
          - exists_result is not failed
          - exists_result.get('exists') | default(false) | bool
        fail_msg: "Verify: service_type not found (http direct)."

- name: Verify — service_type created (http persistent)
  hosts: localhost
  connection: ansible.platform.http
  gather_facts: false
  vars:
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false
    ansible_platform_use_persistent_connection: true
  tasks:
    - name: Get service_type (state exists, http persistent)
      ansible.platform.service_type:
        name: "molecule-mock-svctype-local-hp"
        state: exists
      register: exists_result

    - name: Assert service_type was found (http persistent)
      ansible.builtin.assert:
        that:
          - exists_result is not failed
          - exists_result.get('exists') | default(false) | bool
        fail_msg: "Verify: service_type not found (http persistent)."
...
