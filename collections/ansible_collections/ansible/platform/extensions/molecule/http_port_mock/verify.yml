---
- name: Verify — http_port created (connection local)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false
  tasks:
    - name: Get http_port (state exists, connection local)
      ansible.platform.http_port:
        name: "molecule-mock-port-local"
        state: exists
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: exists_result_local
      vars:
        ansible_connection: local

    - name: Assert http_port was found (connection local)
      ansible.builtin.assert:
        that:
          - exists_result_local is not failed
          - exists_result_local.get('exists') | default(false) | bool
          - exists_result_local.get('http_port', {}).get('use_https') == true
        fail_msg: "Verify: http_port not found or use_https not updated (connection local)."
      vars:
        ansible_connection: local

- name: Verify — http_port created (http direct)
  hosts: localhost
  connection: ansible.platform.http
  gather_facts: false
  vars:
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false
    ansible_platform_use_persistent_connection: false
  tasks:
    - name: Get http_port (state exists, http direct)
      ansible.platform.http_port:
        name: "molecule-mock-port-local-hd"
        state: exists
      register: exists_result_http_direct

    - name: Assert http_port was found (http direct)
      ansible.builtin.assert:
        that:
          - exists_result_http_direct is not failed
          - exists_result_http_direct.get('exists') | default(false) | bool
          - exists_result_http_direct.get('http_port', {}).get('use_https') == true
        fail_msg: "Verify: http_port not found or use_https not updated (http direct)."

- name: Verify — http_port created (http persistent)
  hosts: localhost
  connection: ansible.platform.http
  gather_facts: false
  vars:
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false
    ansible_platform_use_persistent_connection: true
  tasks:
    - name: Get http_port (state exists, http persistent)
      ansible.platform.http_port:
        name: "molecule-mock-port-local-hp"
        state: exists
      register: exists_result_http_persistent

    - name: Assert http_port was found (http persistent)
      ansible.builtin.assert:
        that:
          - exists_result_http_persistent is not failed
          - exists_result_http_persistent.get('exists') | default(false) | bool
          - exists_result_http_persistent.get('http_port', {}).get('use_https') == true
        fail_msg: "Verify: http_port not found or use_https not updated (http persistent)."
...
