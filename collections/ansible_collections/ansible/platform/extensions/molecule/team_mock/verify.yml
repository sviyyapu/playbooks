  vars:
    molecule_team_http_persistent: "molecule-mock-team-local-hp"
    molecule_org: "Default"
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false
    ansible_platform_use_persistent_connection: true
  tasks:
    - name: Get team (state exists, http persistent)
      ansible.platform.team:
        name: "{{ molecule_team_http_persistent }}"
        organization: "{{ molecule_org }}"
