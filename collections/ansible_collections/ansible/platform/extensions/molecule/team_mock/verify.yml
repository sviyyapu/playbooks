    - name: Assert team was found (http persistent)
      ansible.builtin.assert:
        that:
          - exists_result_http_persistent is not failed
          - exists_result_http_persistent.get('exists') | default(false) | bool
          - exists_result_http_persistent.get('team') is defined
        fail_msg: "Verify: could not find team {{ molecule_team_http_persistent }} (http persistent)."

    - name: Assert description updated (http persistent)
      ansible.builtin.assert:
        that: exists_result_http_persistent.team.description == "Updated by Molecule team_mock (http persistent)"
        fail_msg: "Verify: team (http persistent) description was not updated."
...
