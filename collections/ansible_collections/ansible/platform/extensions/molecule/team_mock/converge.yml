---
- name: Ensure mock Gateway is reachable
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    gateway_hostname: "http://127.0.0.1:8000"
  tasks:
    - name: Wait for mock Gateway health endpoint
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/health"
        method: GET
        status_code: 200
      register: health
      retries: 12
      delay: 5
      until: health.status == 200
      vars:
        ansible_connection: local

    - name: Ensure /tmp/ap directory exists
      ansible.builtin.file:
        path: /tmp/ap
        state: directory
        mode: "0755"
      vars:
        ansible_connection: local

    - name: Create manager survive flag (Molecule keeps manager alive across phases)
      ansible.builtin.file:
        path: /tmp/ap/.survive
        state: touch
        mode: "0600"
      vars:
        ansible_connection: local

- name: Converge — team (mock, connection local)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    molecule_team_local: "molecule-mock-team-local"
    molecule_org: "Default"
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false
  tasks:
    - name: Create team (connection local)
      ansible.platform.team:
        name: "{{ molecule_team_local }}"
        organization: "{{ molecule_org }}"
        description: "Created by Molecule team_mock (local)"
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: create_result_local
      vars:
        ansible_connection: local

    - name: Assert create changed (local)
      ansible.builtin.assert:
        that:
          - create_result_local is changed
          - create_result_local.team.id is defined
          - create_result_local.team.name == molecule_team_local
        fail_msg: "Create (local) should report changed. create_result_local={{ create_result_local }}"
      vars:
        ansible_connection: local

    - name: Assert RETURN shape — no internal/readonly keys in result.team (ANSTRAT-1640)
      ansible.builtin.assert:
        that:
          - "'_timing' not in create_result_local"
          - "'_timing' not in create_result_local.team"
          - "'changed' not in create_result_local.team"
          - "'state' not in create_result_local.team"
          - "'new_name' not in create_result_local.team"
          - "'new_organization' not in create_result_local.team"
          - "'created' not in create_result_local.team"
          - "'modified' not in create_result_local.team"
          - "'url' not in create_result_local.team"
        fail_msg: "RETURN shape violation: internal/readonly keys leaked into result.team. result={{ create_result_local }}"
      vars:
        ansible_connection: local

    - name: Run again idempotency (local)
      ansible.platform.team:
        name: "{{ molecule_team_local }}"
        organization: "{{ molecule_org }}"
        description: "Created by Molecule team_mock (local)"
        state: present
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: idem_result_local
      vars:
        ansible_connection: local

    - name: Assert idempotent run did not change (local)
      ansible.builtin.assert:
        that: idem_result_local is not changed
      vars:
        ansible_connection: local

    - name: Update team (local)
      ansible.platform.team:
        name: "{{ molecule_team_local }}"
        organization: "{{ molecule_org }}"
        description: "Updated by Molecule team_mock (local)"
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: update_result_local
      vars:
        ansible_connection: local

    - name: Assert update changed (local)
      ansible.builtin.assert:
        that: update_result_local is changed
      vars:
        ansible_connection: local

