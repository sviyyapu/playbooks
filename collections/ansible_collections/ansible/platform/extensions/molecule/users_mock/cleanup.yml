---
# Cleanup: remove the test user if it still exists (e.g. converge failed mid-way).
- name: Cleanup — delete test user (mock)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    molecule_username: "molecule-test-user"
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false
  tasks:
    - name: Delete test user (cleanup)
      ansible.platform.user:
        username: "{{ molecule_username }}"
        state: absent
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: cleanup_result
      failed_when: false
      vars:
        ansible_connection: local

    - name: Assert cleanup did not hard-fail
      ansible.builtin.assert:
        that: cleanup_result is not failed
        fail_msg: "Cleanup: unexpected hard failure deleting test user. cleanup_result={{ cleanup_result }}"
      vars:
        ansible_connection: local

    - name: Remove manager survive flag (signals manager to shut down)
      ansible.builtin.file:
        path: /tmp/ap/.survive
        state: absent
      vars:
        ansible_connection: local

