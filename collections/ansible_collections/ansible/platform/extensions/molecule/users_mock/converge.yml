---
# Converge: user create, idempotency, update, password handling, exists, delete
# against mock Gateway (no real AAP instance required).

# Play 1: health check — must use connection: local (uri module, not platform connection).
- name: Ensure mock Gateway is reachable
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    gateway_hostname: "http://127.0.0.1:8000"
  tasks:
    - name: Wait for mock Gateway health endpoint
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/health"
        method: GET
        status_code: 200
      register: health
      retries: 12
      delay: 5
      until: health.status == 200
      vars:
        ansible_connection: local

# Play 2: full user lifecycle (connection local / direct mode).
    - name: Ensure /tmp/ap directory exists
      ansible.builtin.file:
        path: /tmp/ap
        state: directory
        mode: "0755"
      vars:
        ansible_connection: local

    - name: Create manager survive flag (Molecule keeps manager alive across phases)
      ansible.builtin.file:
        path: /tmp/ap/.survive
        state: touch
        mode: "0600"
      vars:
        ansible_connection: local

- name: Converge — user (mock, connection local)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    molecule_username: "molecule-test-user"
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false

  tasks:
    # ── Create ─────────────────────────────────────────────────────────────────
    - name: Create user (connection local)
      ansible.platform.user:
        username: "{{ molecule_username }}"
        first_name: "Molecule"
        last_name: "TestUser"
        email: "molecule-test@mock.example.com"
        password: "MockPass123!"
        is_superuser: false
        state: present
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: create_result
      vars:
        ansible_connection: local

    - name: Assert create changed
      ansible.builtin.assert:
        that:
          - create_result is changed
          - create_result.user.id is defined
          - create_result.user.username == molecule_username
        fail_msg: "Create should report changed. create_result={{ create_result }}"
      vars:
        ansible_connection: local

    - name: Assert RETURN shape — no internal/readonly keys in result.user (ANSTRAT-1640)
      ansible.builtin.assert:
        that:
          - "'_timing' not in create_result"
          - "'_timing' not in create_result.user"
          - "'changed' not in create_result.user"
          - "'state' not in create_result.user"
          - "'created' not in create_result.user"
          - "'modified' not in create_result.user"
          - "'url' not in create_result.user"
        fail_msg: "RETURN shape violation: internal/readonly keys leaked into result.user. result={{ create_result }}"
      vars:
        ansible_connection: local

    # ── Idempotency (present) ─────────────────────────────────────────────────
    - name: Run again idempotency (connection local)
      ansible.platform.user:
        username: "{{ molecule_username }}"
        first_name: "Molecule"
        last_name: "TestUser"
        email: "molecule-test@mock.example.com"
        is_superuser: false
        state: present
        update_secrets: false
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: idem_result
      vars:
        ansible_connection: local

    - name: Assert idempotent run did not change (connection local)
      ansible.builtin.assert:
        that: idem_result is not changed
        fail_msg: "Idempotent run should not report changed. idem_result={{ idem_result }}"
      vars:
        ansible_connection: local

    # ── Update (change email and last_name) ───────────────────────────────────
    - name: Update user email and last_name (connection local)
      ansible.platform.user:
        username: "{{ molecule_username }}"
        first_name: "Molecule"
        last_name: "UpdatedUser"
        email: "molecule-updated@mock.example.com"
        state: present
        update_secrets: false
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: update_result
      vars:
        ansible_connection: local

    - name: Assert update changed
      ansible.builtin.assert:
        that: update_result is changed
        fail_msg: "Update should report changed. update_result={{ update_result }}"
      vars:
        ansible_connection: local

    # ── Update idempotency ────────────────────────────────────────────────────
    - name: Run update again idempotency (connection local)
      ansible.platform.user:
        username: "{{ molecule_username }}"
        first_name: "Molecule"
        last_name: "UpdatedUser"
        email: "molecule-updated@mock.example.com"
        state: present
        update_secrets: false
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: update_idem_result
      vars:
        ansible_connection: local

    - name: Assert update idempotent run did not change
      ansible.builtin.assert:
        that: update_idem_result is not changed
        fail_msg: "Update idempotent run should not report changed. update_idem_result={{ update_idem_result }}"
      vars:
        ansible_connection: local

    # ── state: exists ─────────────────────────────────────────────────────────
    - name: Check user exists (state exists, connection local)
      ansible.platform.user:
        username: "{{ molecule_username }}"
        state: exists
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: exists_result
      vars:
        ansible_connection: local

    - name: Assert exists returns correct data
      ansible.builtin.assert:
        that:
          - exists_result is not changed
          - exists_result is not failed
          - exists_result.get('exists') | default(false) | bool
          - exists_result.user.username == molecule_username
        fail_msg: "state:exists should find user. exists_result={{ exists_result }}"
      vars:
        ansible_connection: local

    # ── state: exists for non-existent user ───────────────────────────────────
    - name: Check non-existent user (state exists, connection local)
      ansible.platform.user:
        username: "user-that-does-not-exist"
        state: exists
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: not_exists_result
      vars:
        ansible_connection: local

    - name: Assert non-existent user returns exists false
      ansible.builtin.assert:
        that:
          - not_exists_result is not changed
          - not_exists_result is not failed
          - not (not_exists_result.get('exists') | default(false) | bool)
        fail_msg: "state:exists for missing user should return exists=false. not_exists_result={{ not_exists_result }}"
      vars:
        ansible_connection: local

    # ── Delete ────────────────────────────────────────────────────────────────
    - name: Delete user (connection local)
      ansible.platform.user:
        username: "{{ molecule_username }}"
        state: absent
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: delete_result
      vars:
        ansible_connection: local

    - name: Assert delete changed
      ansible.builtin.assert:
        that: delete_result is changed
        fail_msg: "Delete should report changed. delete_result={{ delete_result }}"
      vars:
        ansible_connection: local

    # ── Delete idempotency ────────────────────────────────────────────────────
    - name: Delete again (idempotency, connection local)
      ansible.platform.user:
        username: "{{ molecule_username }}"
        state: absent
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: delete_idem_result
      vars:
        ansible_connection: local

    - name: Assert second delete is a no-op
      ansible.builtin.assert:
        that: delete_idem_result is not changed
        fail_msg: "Second delete should not report changed. delete_idem_result={{ delete_idem_result }}"
      vars:
        ansible_connection: local

