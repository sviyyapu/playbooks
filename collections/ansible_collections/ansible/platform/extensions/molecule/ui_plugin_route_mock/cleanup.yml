---
- name: Cleanup — delete ui_plugin_routes
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    gateway_hostname: "http://127.0.0.1:8000"
    gateway_username: "mock"
    gateway_password: "testpass"
    gateway_validate_certs: false
  tasks:
    - name: Delete ui_plugin_route (direct)
      ansible.platform.ui_plugin_route:
        name: "molecule-mock-ui-route-direct"
        state: absent
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: delete_result
      failed_when: false
      vars:
        ansible_connection: local

    - name: Assert ui_plugin_route removed (direct)
      ansible.builtin.assert:
        that: delete_result is not failed
        fail_msg: "Cleanup: failed to delete ui_plugin_route (direct)."
      vars:
        ansible_connection: local

    - name: Delete ui_plugin_route (persistent)
      ansible.platform.ui_plugin_route:
        name: "molecule-mock-ui-route-persistent"
        state: absent
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: delete_result_persistent
      failed_when: false
      vars:
        ansible_connection: local

    - name: Assert ui_plugin_route removed (persistent)
      ansible.builtin.assert:
        that: delete_result_persistent is not failed
        fail_msg: "Cleanup: failed to delete ui_plugin_route (persistent)."
      vars:
        ansible_connection: local

    - name: Delete ui_plugin_route (local)
      ansible.platform.ui_plugin_route:
        name: "molecule-mock-ui-route-local"
        state: absent
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_username: "{{ gateway_username }}"
        gateway_password: "{{ gateway_password }}"
        gateway_validate_certs: "{{ gateway_validate_certs }}"
      register: delete_result_local
      failed_when: false
      vars:
        ansible_connection: local

    - name: Assert ui_plugin_route removed (local)
      ansible.builtin.assert:
        that: delete_result_local is not failed
        fail_msg: "Cleanup: failed to delete ui_plugin_route (local)."
      vars:
        ansible_connection: local

    - name: Remove manager survive flag (signals manager to shut down)
      ansible.builtin.file:
        path: /tmp/ap/.survive
        state: absent
      vars:
        ansible_connection: local

