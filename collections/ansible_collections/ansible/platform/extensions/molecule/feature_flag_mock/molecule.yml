---
driver:
  name: default

platforms:
  - name: localhost

ansible:
  executor:
    args:
      ansible_playbook:
        - --inventory=${MOLECULE_SCENARIO_DIRECTORY}/../inventory.yml

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml
    cleanup: cleanup.yml
  config_options:
    defaults:
      collections_path: "${MOLECULE_SCENARIO_DIRECTORY}/../../../../../../"
      # Write verbose messages (vv/vvvv) to ANSIBLE_LOG_PATH even without -v on the terminal.
      log_verbosity: 4

scenario:
  test_sequence:
    - converge
    - verify
    - cleanup
...
