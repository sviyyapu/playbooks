---
- name: Generate a test ID
  ansible.builtin.set_fact:
    test_id: "{{ lookup('password', '/dev/null chars=ascii_letters length=16') }}"
  when: test_id is not defined

- name: Run Test
  module_defaults:
    group/ansible.platform.gateway:
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs | bool }}"

  block:
    # Pre-cleanup: remove leftovers from prior failed runs
    - name: Pre-cleanup service cluster - renamed EDA
      ansible.platform.service_cluster:
        name: "Event Driven Automation"
        state: absent
      failed_when: false

    - name: Pre-cleanup service cluster - Controller
      ansible.platform.service_cluster:
        name: "{{ test_id }}-Automation-Controller"
        state: absent
      failed_when: false

    - name: Pre-cleanup service cluster - Hub
      ansible.platform.service_cluster:
        name: "{{ test_id }}-Automation-Hub"
        state: absent
      failed_when: false

    - name: Pre-cleanup service cluster - EDA
      ansible.platform.service_cluster:
        name: "{{ test_id }}-AAP-eda"
        state: absent
      failed_when: false

    - name: Pre-cleanup service type - controller
      ansible.platform.service_type:
        name: "{{ test_id }}controller"
        state: absent
      failed_when: false

    - name: Pre-cleanup service type - hub
      ansible.platform.service_type:
        name: "{{ test_id }}hub"
        state: absent
      failed_when: false

    - name: Pre-cleanup service type - eda
      ansible.platform.service_type:
        name: "{{ test_id }}eda"
        state: absent
      failed_when: false

    - name: Create Controller Service Type with check mode
      ansible.platform.service_type:
        name: "{{ test_id }}controller"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      check_mode: true

    - name: Search for the Controller Service Type
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/service_clusters/?name={{ (test_id + 'controller') | urlencode }}"
        method: GET
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [200]
      delegate_to: localhost
      register: controller_search

    - name: Assert that Controller Service Cluster does not exist
      ansible.builtin.assert:
        that:
          - controller_search.json.count == 0
        fail_msg: "Service Cluster '{{ test_id }}controller' exists in the system!"

    - name: Create Controller Service Type
      ansible.platform.service_type:
        name: "{{ test_id }}controller"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      register: controller_st

    - name: Create Controller Service Cluster
      ansible.platform.service_cluster:
        name: "{{ test_id }}-Automation-Controller"
        service_type: "{{ controller_st.service_type.id }}"
        health_check_interval_seconds: 1162
        dns_discovery_type: LOGICAL_DNS
        dns_lookup_family: V4_ONLY
      register: controller_sc

    - name: Assert that we created the controller service cluster
      ansible.builtin.assert:
        that:
          - controller_sc is changed

    - name: Recreate Controller Service Cluster
      ansible.platform.service_cluster:
        name: "{{ test_id }}-Automation-Controller"
        service_type: "{{ controller_st.service_type.id }}"
        health_check_interval_seconds: 1162
      register: recreate_controller_sc

    - name: Assert that we a recreate does not change the system
      ansible.builtin.assert:
        that:
          - recreate_controller_sc is not changed

    - name: Create Automation Hub Service Type
      ansible.platform.service_type:
        name: "{{ test_id }}hub"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      register: hub_st

    - name: Create Automation Hub Cluster
      ansible.platform.service_cluster:
        name: "{{ test_id }}-Automation-Hub"
        service_type: "{{ hub_st.service_type.id }}"
        health_check_interval_seconds: 1162
        upstream_hostname: hub.com
      register: hub_sc

    - name: Assert that we created the hub service cluster
      ansible.builtin.assert:
        that:
          - hub_sc is changed

    - name: Create EDA Service Type
      ansible.platform.service_type:
        name: "{{ test_id }}eda"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      register: eda_st

    - name: Create EDA Service Cluster
      ansible.platform.service_cluster:
        name: "{{ test_id }}-AAP-eda"
        service_type: "{{ eda_st.service_type.id }}"
        health_check_interval_seconds: 333
      register: eda_sc

    - name: Assert that we created the eda service cluster
      ansible.builtin.assert:
        that:
          - eda_sc is changed

    - name: Assert that exists works
      ansible.platform.service_cluster:
        name: "{{  controller_sc.service_cluster.name }}"
        state: exists
      register: exists_controller_sc

    - name: Assert that exists does not change the system
      ansible.builtin.assert:
        that:
          - exists_controller_sc is not changed

    - name: Assert exists works with parameters
      ansible.platform.service_cluster:
        name: "{{ hub_sc.service_cluster.name }}"
        service_type: "{{ hub_st.service_type.id }}"
        upstream_hostname: hub.com
        state: exists
      register: exists_hub

    - name: Assert that exists does not change the system
      ansible.builtin.assert:
        that:
          - exists_hub is not changed

    - name: Rename a service cluster
      ansible.platform.service_cluster:
        name: "{{ eda_sc.service_cluster.id }}" # AAP gateway
        new_name: "Event Driven Automation"
      register: renamed_eda_sc

    - name: Assert that we can rename a service cluster
      ansible.builtin.assert:
        that:
          - renamed_eda_sc is changed
          - renamed_eda_sc.service_cluster.id == eda_sc.service_cluster.id

    - name: Change a health check interval
      ansible.platform.service_cluster:
        name: "{{ eda_sc.service_cluster.id }}"
        health_check_interval_seconds: 1162
      register: changed_eda_sc

    - name: Assert that we can change a service cluster
      ansible.builtin.assert:
        that:
          - changed_eda_sc is changed
          - changed_eda_sc.service_cluster.id == eda_sc.service_cluster.id

    - name: Query the server for service clusters with specific health check interval
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/service_clusters/?health_check_interval_seconds=1162"
        method: GET
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [200]
      delegate_to: localhost
      register: _sc_health_check_response

    - name: Ensure we have 3 service clusters with health_check_interval_seconds=1162
      ansible.builtin.assert:
        that:
          - _sc_health_check_response.json.count == 3

    - name: Delete a non-existent service cluster
      ansible.platform.service_cluster:
        name: "{{ test_id }}-DoesNotExist"
        state: absent
      register: delete_dne

    - name: Assert that the deletion of a non-existent does not change the system
      ansible.builtin.assert:
        that:
          - delete_dne is not changed

    - name: Delete a real service cluster
      ansible.platform.service_cluster:
        name: "{{ controller_sc.service_cluster.id }}"
        state: absent
      register: delete_controller_sc

    - name: Assert that deletion of a real service cluster changes the system
      ansible.builtin.assert:
        that:
          - delete_controller_sc is changed

    - name: Change a service type
      ansible.platform.service_cluster:
        name: "{{ eda_sc.service_cluster.id }}"
        service_type: "{{ controller_st.service_type.id }}"
      register: change_eda_sc

    - name: Assert that we can change a cluster type
      ansible.builtin.assert:
        that:
          - change_eda_sc is changed
          - change_eda_sc.service_cluster.id == eda_sc.service_cluster.id

    - name: Change auth_type for a service
      ansible.platform.service_cluster:
        name: "{{ eda_sc.service_cluster.id }}"
        auth_type: "TOKEN"
      register: change_eda_auth_type

    - name: Assert that auth_type is changed
      ansible.builtin.assert:
        that:
          - change_eda_auth_type is changed

  always:
    - name: Delete Controller Service Cluster
      ansible.platform.service_cluster:
        name: "{{ test_id }}-Automation-Controller"
        state: absent
      failed_when: false

    - name: Delete Hub Service Cluster
      ansible.platform.service_cluster:
        name: "{{ test_id }}-Automation-Hub"
        state: absent
      failed_when: false

    - name: Delete EDA Service Cluster
      ansible.platform.service_cluster:
        name: "{{ test_id }}-AAP-eda"
        state: absent
      failed_when: false

    - name: Delete renamed EDA Service Cluster
      ansible.platform.service_cluster:
        name: "Event Driven Automation"
        state: absent
      failed_when: false

    - name: Delete Service Type - controller
      ansible.platform.service_type:
        name: "{{ test_id }}controller"
        state: absent
      failed_when: false

    - name: Delete Service Type - hub
      ansible.platform.service_type:
        name: "{{ test_id }}hub"
        state: absent
      failed_when: false

    - name: Delete Service Type - eda
      ansible.platform.service_type:
        name: "{{ test_id }}eda"
        state: absent
      failed_when: false
...
