---
- name: Generate a test ID
  ansible.builtin.set_fact:
    test_id: "{{ lookup('password', '/dev/null chars=ascii_letters length=16') }}"
  when: test_id is not defined

- name: Preset vars
  ansible.builtin.set_fact:
    name_prefix: "GW-Collection-Test-ServiceKeys-{{ test_id }}"

- name: Run Test
  module_defaults:
    group/ansible.platform.gateway:
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs | bool }}"

  block:
    # Pre-cleanup: remove leftovers from prior failed runs
    - name: Pre-cleanup service keys by name
      ansible.platform.service_key:
        name: "{{ item }}"
        state: absent
      loop:
        - "{{ name_prefix }}-Key 1"
        - "{{ name_prefix }}-Key 2"
        - "{{ name_prefix }}-Key 3"
        - "{{ name_prefix }}-Key 4"
        - "{{ name_prefix }}-Key 5"
      failed_when: false

    - name: Pre-cleanup service cluster - Automation Controller
      ansible.platform.service_cluster:
        name: "Automation Controller"
        state: absent
      failed_when: false

    - name: Pre-cleanup service cluster - Automation Hub
      ansible.platform.service_cluster:
        name: "Automation Hub"
        state: absent
      failed_when: false

    - name: Pre-cleanup service cluster - Event Driven Automation
      ansible.platform.service_cluster:
        name: "Event Driven Automation"
        state: absent
      failed_when: false

    - name: Pre-cleanup service type - controller
      ansible.platform.service_type:
        name: "{{ test_id }}controller"
        state: absent
      failed_when: false

    - name: Pre-cleanup service type - hub
      ansible.platform.service_type:
        name: "{{ test_id }}hub"
        state: absent
      failed_when: false

    - name: Pre-cleanup service type - eda
      ansible.platform.service_type:
        name: "{{ test_id }}eda"
        state: absent
      failed_when: false

    # <Service Clusters> ----------------------------
    - name: Create Controller Service Type
      ansible.platform.service_type:
        name: "{{ test_id }}controller"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      register: controller_st

    - name: Create Controller Service Cluster
      ansible.platform.service_cluster:
        name: "Automation Controller"
        service_type: "{{ controller_st.service_type.id }}"
      register: controller_sc

    - name: Create Hub Service Type
      ansible.platform.service_type:
        name: "{{ test_id }}hub"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      register: hub_st

    - name: Create Hub Service Cluster
      ansible.platform.service_cluster:
        name: Automation Hub
        service_type: "{{ hub_st.service_type.id }}"
      register: hub_sc

    - name: Create EDA Service Type
      ansible.platform.service_type:
        name: "{{ test_id }}eda"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      register: eda_st

    - name: "Create EDA Service Cluster"
      ansible.platform.service_cluster:
        name: Event Driven Automation
        service_type: "{{ eda_st.service_type.id }}"
      register: eda_sc
    # </Service Clusters> ----------------------------

    # <Service Keys> ----------------------------
    - name: Create Service Key 1 with check mode
      ansible.platform.service_key:
        name: "{{ name_prefix }}-Key 1"
        is_active: true
        service_cluster: "{{ controller_sc.service_cluster.id }}"
        algorithm: HS384
        secret: "gateway-secret"
        mark_previous_inactive: false
      check_mode: true

    - name: Search for Service Key 1
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/service_keys/?name={{ (name_prefix + '-Key 1') | urlencode }}"
        method: GET
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [200]
      delegate_to: localhost
      register: service_key_search

    - name: Assert that Service Key 1 does not exist
      ansible.builtin.assert:
        that:
          - service_key_search.json.count == 0
        fail_msg: "Service Key '{{ name_prefix }}-Key 1' exists in the system!"

    - name: Create Service Key 1
      ansible.platform.service_key:
        name: "{{ name_prefix }}-Key 1"
        is_active: true
        service_cluster: "{{ controller_sc.service_cluster.id }}"
        algorithm: HS384
        secret: "gateway-secret"
        mark_previous_inactive: false
      register: service_key1

    - name: Assert that we created service key 1
      ansible.builtin.assert:
        that:
          - service_key1 is changed

    - name: Re-run Service Key 1 with the same raw secret (idempotency)
      ansible.platform.service_key:
        name: "{{ name_prefix }}-Key 1"
        is_active: true
        service_cluster: "{{ controller_sc.service_cluster.id }}"
        algorithm: HS384
        secret: "gateway-secret"
        mark_previous_inactive: false
      register: rerun_service_key1_with_secret

    - name: Assert that re-run with secret does not change the system
      ansible.builtin.assert:
        that:
          - rerun_service_key1_with_secret is not changed

    # We have to take out the secret because its encrypted
    - name: Recreate Service Key 1
      ansible.platform.service_key:
        name: "{{ name_prefix }}-Key 1"
        is_active: true
        service_cluster: "{{ controller_sc.service_cluster.id }}"
        algorithm: HS384
        mark_previous_inactive: false
      register: recreate_service_key1

    - name: Assert that recreate does not change the system
      ansible.builtin.assert:
        that:
          - recreate_service_key1 is not changed

    - name: Create Service Key 2
      ansible.platform.service_key:
        name: "{{ name_prefix }}-Key 2"
        service_cluster: "{{ hub_sc.service_cluster.name }}"
        secret: "gateway-secret"
        mark_previous_inactive: true
      register: service_key2

    - name: Assert that we created service key 2
      ansible.builtin.assert:
        that:
          - service_key2 is changed

    - name: Create Service Key 3
      ansible.platform.service_key:
        name: "{{ name_prefix }}-Key 3"
        is_active: false
        service_cluster: "{{ controller_sc.service_cluster.id }}"  # Controller
        mark_previous_inactive: false
      register: service_key3

    - name: Assert that we created service key 3
      ansible.builtin.assert:
        that:
          - service_key3 is changed

    - name: Create Service Key 4
      ansible.platform.service_key:
        name: "{{ name_prefix }}-Key 4"
        service_cluster: "{{ eda_sc.service_cluster.id }}"  # EDA
        mark_previous_inactive: false
      register: service_key4

    - name: Assert that we created service key 4
      ansible.builtin.assert:
        that:
          - service_key4 is changed

    - name: Create Service Key 5
      ansible.platform.service_key:
        name: "{{ name_prefix }}-Key 5"
        service_cluster: "{{ controller_sc.service_cluster.id }}"  # Controller, have to set others as inactive
        mark_previous_inactive: true
      register: service_key5

    - name: Assert that we created service key 5
      ansible.builtin.assert:
        that:
          - service_key5 is changed

    - name: Deactivate a key
      ansible.platform.service_key:
        name: "{{ service_key2.service_key.name }}"
        is_active: false
      register: change_service_key2

    - name: Assert that we changed the existing key
      ansible.builtin.assert:
        that:
          - change_service_key2 is changed
          - change_service_key2.service_key.id == service_key2.service_key.id

    - name: See if a key exists
      ansible.platform.service_key:
        name: "{{ service_key3.service_key.id }}"
        state: exists
      register: exists_service_key3

    - name: Assert that exists does not change the system
      ansible.builtin.assert:
        that:
          - exists_service_key3 is not changed

    - name: Rename a key
      ansible.platform.service_key:
        name: "{{ service_key4.service_key.id }}"
        new_name: "{{ service_key4.service_key.id }}-New"
      register: rename_service_key4

    - name: Assert that the rename changed an existing service key
      ansible.builtin.assert:
        that:
          - rename_service_key4 is changed
          - rename_service_key4.service_key.id == service_key4.service_key.id

    - name: Delete a non-existing service key
      ansible.platform.service_key:
        name: "{{ name_prefix }}-DNE"
        state: absent
      register: delete

    - name: Assert that delete of non-existent dies not change the system
      ansible.builtin.assert:
        that:
          - delete is not changed

    - name: Delete an actual service key
      ansible.platform.service_key:
        name: "{{ service_key5.service_key.id }}"
        state: absent
      register: delete

    - name: Assert that the delete changed the system
      ansible.builtin.assert:
        that:
          - delete is changed

  always:
    - name: Delete Service Key 1
      ansible.platform.service_key:
        name: "{{ name_prefix }}-Key 1"
        state: absent
      failed_when: false

    - name: Delete Service Key 2
      ansible.platform.service_key:
        name: "{{ name_prefix }}-Key 2"
        state: absent
      failed_when: false

    - name: Delete Service Key 3
      ansible.platform.service_key:
        name: "{{ name_prefix }}-Key 3"
        state: absent
      failed_when: false

    - name: Delete Service Key 4
      ansible.platform.service_key:
        name: "{{ name_prefix }}-Key 4"
        state: absent
      failed_when: false

    - name: Delete Service Key 5
      ansible.platform.service_key:
        name: "{{ name_prefix }}-Key 5"
        state: absent
      failed_when: false

    - name: Delete Service Cluster - Automation Controller
      ansible.platform.service_cluster:
        name: "Automation Controller"
        state: absent
      failed_when: false

    - name: Delete Service Cluster - Automation Hub
      ansible.platform.service_cluster:
        name: "Automation Hub"
        state: absent
      failed_when: false

    - name: Delete Service Cluster - Event Driven Automation
      ansible.platform.service_cluster:
        name: "Event Driven Automation"
        state: absent
      failed_when: false

    - name: Delete Service Type - controller
      ansible.platform.service_type:
        name: "{{ test_id }}controller"
        state: absent
      failed_when: false

    - name: Delete Service Type - hub
      ansible.platform.service_type:
        name: "{{ test_id }}hub"
        state: absent
      failed_when: false

    - name: Delete Service Type - eda
      ansible.platform.service_type:
        name: "{{ test_id }}eda"
        state: absent
      failed_when: false
...
