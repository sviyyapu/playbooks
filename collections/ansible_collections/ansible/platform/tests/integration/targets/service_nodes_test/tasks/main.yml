---
- name: Generate a test ID
  ansible.builtin.set_fact:
    test_id: "{{ lookup('password', '/dev/null chars=ascii_letters length=16') }}"
  when: test_id is not defined

- name: Run Test
  module_defaults:
    group/ansible.platform.gateway:
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs | bool }}"

  block:
    # Pre-cleanup: remove leftovers from prior failed runs
    - name: Pre-cleanup service nodes
      ansible.platform.service_node:
        name: "{{ item }}"
        state: absent
      loop:
        - "Controller on 10.10.0.1"
        - "Controller on 10.10.0.1-New"
        - "Hub on 10.10.0.2"
        - "Controller on 10.10.0.3"
        - "Controller on 10.10.0.5"
        - "Controller on 10.10.0.7"
      failed_when: false

    - name: Pre-cleanup service clusters
      ansible.platform.service_cluster:
        name: "{{ item }}"
        state: absent
      loop:
        - "{{ test_id }}-Automation-Controller"
        - "{{ test_id }}-Automation-Hub"
        - "{{ test_id }}-Event-Driven-Automation"
      failed_when: false

    - name: Pre-cleanup service types
      ansible.platform.service_type:
        name: "{{ item }}"
        state: absent
      loop:
        - "{{ test_id }}controller"
        - "{{ test_id }}hub"
        - "{{ test_id }}eda"
      failed_when: false

    - name: Create Controller Service Type
      ansible.platform.service_type:
        name: "{{ test_id }}controller"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      register: controller_st

    - name: Create Controller Service Cluster
      ansible.platform.service_cluster:
        name: "{{ test_id }}-Automation-Controller"
        service_type: "{{ controller_st.service_type.id }}"
      register: controller_sc

    - name: Create Hub Service Type
      ansible.platform.service_type:
        name: "{{ test_id }}hub"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      register: hub_st

    - name: Create Hub Service Cluster
      ansible.platform.service_cluster:
        name: "{{ test_id }}-Automation-Hub"
        service_type: "{{ hub_st.service_type.id }}"
      register: hub_sc

    - name: Create EDA Service Type
      ansible.platform.service_type:
        name: "{{ test_id }}eda"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      register: eda_st

    - name: Create Event Driven Automation Service Cluster
      ansible.platform.service_cluster:
        name: "{{ test_id }}-Event-Driven-Automation"
        service_type: "{{ eda_st.service_type.id }}"
      register: eda_sc

    - name: Create Service Node1 with check mode
      ansible.platform.service_node:
        name: "Controller on 10.10.0.1"
        address: 10.10.0.1
        service_cluster: "{{ controller_sc.service_cluster.name }}"
      check_mode: true

    - name: Search for Service Node 1
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/service_nodes/?name={{ 'Controller on 10.10.0.1' | urlencode }}"
        method: GET
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [200]
      delegate_to: localhost
      register: service_node_search

    - name: Assert that Service Node 1 does not exist
      ansible.builtin.assert:
        that:
          - service_node_search.json.count == 0
        fail_msg: "Service Node 'Controller on 10.10.0.1' exists in the system!"

    - name: Create Service Node 1
      ansible.platform.service_node:
        name: "Controller on 10.10.0.1"
        address: 10.10.0.1
        service_cluster: "{{ controller_sc.service_cluster.name }}"
      register: service_node_1

    - name: Assert that we created service node 1
      ansible.builtin.assert:
        that:
          - service_node_1 is changed

    - name: Recreate Service Node 1
      ansible.platform.service_node:
        name: "Controller on 10.10.0.1"
        address: 10.10.0.1
        service_cluster: "{{ controller_sc.service_cluster.name }}"
      register: recreate_service_node_1

    - name: Assert that a recreate does not change the system
      ansible.builtin.assert:
        that:
          - recreate_service_node_1 is not changed

    - name: Create Service Node 2
      ansible.platform.service_node:
        name: "Hub on 10.10.0.2"
        address: 10.10.0.2
        service_cluster: "{{ hub_sc.service_cluster.id }}"
      register: service_node_2

    - name: Assert that we created service node 2
      ansible.builtin.assert:
        that:
          - service_node_2 is changed

    - name: Create Service Node 3
      ansible.platform.service_node:
        name: "Controller on 10.10.0.3"
        address: 10.10.0.3
        service_cluster: "{{ controller_sc.service_cluster.id }}"  # Controller
      register: service_node_3

    - name: Assert that we created service node 3
      ansible.builtin.assert:
        that:
          - service_node_3 is changed

    - name: Create Service Node 4
      ansible.platform.service_node:
        name: "Controller on 10.10.0.5"
        address: 10.10.0.5
        service_cluster: "{{ controller_sc.service_cluster.name }}"
      register: service_node_4

    - name: Assert that we created service node 4
      ansible.builtin.assert:
        that:
          - service_node_4 is changed

    - name: Create Service Node 5
      ansible.platform.service_node:
        name: "Controller on 10.10.0.7"
        address: 10.10.0.7
        service_cluster: "{{ controller_sc.service_cluster.id }}"
      register: service_node_5

    - name: Assert that we created service node 5
      ansible.builtin.assert:
        that:
          - service_node_5 is changed

    - name: Test state exists with parameters
      ansible.platform.service_node:
        name: "{{ service_node_1.service_node.name }}"
        address: 10.10.0.1
        service_cluster: "{{ controller_sc.service_cluster.name }}"
        state: exists
      register: exists_service_node_1

    - name: Assert that exists does not change even with new params
      ansible.builtin.assert:
        that:
          - exists_service_node_1 is not changed

    - name: Test exists
      ansible.platform.service_node:
        name: "{{ service_node_2.service_node.id }}"
        state: exists
      register: exists_service_node_2

    - name: Assert that exists by ID does not change
      ansible.builtin.assert:
        that:
          - exists_service_node_2 is not changed

    - name: Test exists with parameters
      ansible.platform.service_node:
        name: "{{ service_node_3.service_node.name }}"
        service_cluster: "{{ controller_sc.service_cluster.name }}"
        state: exists
      register: exists_service_node_3

    - name: Assert that exists does not change the system
      ansible.builtin.assert:
        that:
          - exists_service_node_3 is not changed

    - name: Delete a non existent service Node
      ansible.platform.service_node:
        name: "{{ test_id }}-does-not-exist"
        state: absent
      register: delete

    - name: Assert that deleting a non-existing service node does not change the system
      ansible.builtin.assert:
        that:
          - delete is not changed

    - name: Test delete node with wrong service
      ansible.platform.service_node:
        name: "{{ service_node_2.service_node.name }}"
        service_cluster: "{{ controller_sc.service_cluster.id }}"
        state: absent
      register: delete

    - name: Assert that deleting a valid service node changes the system
      ansible.builtin.assert:
        that:
          - delete is changed

    - name: Change the address of a node
      ansible.platform.service_node:
        name: "{{ service_node_4.service_node.name }}"
        address: 10.10.0.255  # changed
      register: change_service_node_4

    - name: Assert that we can change a service node
      ansible.builtin.assert:
        that:
          - change_service_node_4 is changed
          - change_service_node_4.service_node.id == service_node_4.service_node.id

    - name: Change a nodes service cluster
      ansible.platform.service_node:
        name: "{{ service_node_5.service_node.name }}"
        service_cluster: "{{ eda_sc.service_cluster.name }}"
      register: change_service_node_5

    - name: Assert that change a service_nodes cluster
      ansible.builtin.assert:
        that:
          - change_service_node_5 is changed
          - change_service_node_5.service_node.id == service_node_5.service_node.id

    - name: Rename Service Nodes
      ansible.platform.service_node:
        name: "{{ service_node_1.service_node.name }}"
        new_name: "{{ service_node_1.service_node.name }}-New"
      register: rename_service_node_1

    - name: Assert that we can rename a service node
      ansible.builtin.assert:
        that:
          - rename_service_node_1 is changed
          - rename_service_node_1.service_node.id == service_node_1.service_node.id

  always:
    - name: Delete Service Nodes
      ansible.platform.service_node:
        name: "{{ item }}"
        state: absent
      loop:
        - "Controller on 10.10.0.1"
        - "Controller on 10.10.0.1-New"
        - "Hub on 10.10.0.2"
        - "Controller on 10.10.0.3"
        - "Controller on 10.10.0.5"
        - "Controller on 10.10.0.7"
      failed_when: false

    - name: Delete Service Clusters
      ansible.platform.service_cluster:
        name: "{{ item }}"
        state: absent
      loop:
        - "{{ test_id }}-Automation-Controller"
        - "{{ test_id }}-Automation-Hub"
        - "{{ test_id }}-Event-Driven-Automation"
      failed_when: false

    - name: Delete Service Types
      ansible.platform.service_type:
        name: "{{ item }}"
        state: absent
      loop:
        - "{{ test_id }}controller"
        - "{{ test_id }}hub"
        - "{{ test_id }}eda"
      failed_when: false
...
