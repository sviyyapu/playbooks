---
- name: Generate a test ID
  ansible.builtin.set_fact:
    test_id: "{{ lookup('password', '/dev/null chars=ascii_letters length=16') }}"
  when: test_id is not defined

- name: Preset vars
  ansible.builtin.set_fact:
    name_prefix: "GW-Collection-Test-Services-{{ test_id }}"

- name: Get existing service clusters
  ansible.builtin.uri:
    url: "{{ gateway_hostname }}/api/gateway/v1/service_clusters/"
    method: GET
    user: "{{ gateway_username }}"
    password: "{{ gateway_password }}"
    validate_certs: "{{ gateway_validate_certs | bool }}"
    force_basic_auth: true
    status_code: 200
  delegate_to: localhost
  register: _sc_uri_result

- name: Set service cluster query fact
  ansible.builtin.set_fact:
    _sc_query: "{{ _sc_uri_result.json.results }}"

- name: Fail if more than one service cluster or that cluster is not a gateway cluster
  ansible.builtin.fail:
    msg: "This test works with 3 service clusters: gateway, eda and hub. It appears you might already have one or more of those, failing"
  when:
    - _sc_query | length > 1
    - _sc_query | length == 1 and _sc_query[0].type != 'gateway'

- name: See if there is an existing is_api_port
  # We need one to create an http_port and there can only be one
  ansible.builtin.uri:
    url: "{{ gateway_hostname }}/api/gateway/v1/http_ports/?is_api_port=true"
    method: GET
    user: "{{ gateway_username }}"
    password: "{{ gateway_password }}"
    validate_certs: "{{ gateway_validate_certs | bool }}"
    force_basic_auth: true
    status_code: 200
  delegate_to: localhost
  register: _http_port_uri_result

- name: Set existing http_api_port fact
  ansible.builtin.set_fact:
    existing_http_api_port: "{{ _http_port_uri_result.json.results }}"

- name: Run Test
  module_defaults:
    group/ansible.platform.gateway:
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs | bool }}"

  block:
    # <Http Ports> --------------------------------
    - name: Create API Port
      ansible.platform.http_port:
        name: "{{ name_prefix }}-API Port"
        number: 9080
        use_https: true
        is_api_port: true
      when: existing_http_api_port | length == 0
      register: new_http_api_port

    - name: Get the API port id (existing or just created)
      ansible.builtin.set_fact:
        api_port_id: "{{ new_http_api_port.http_port.id if new_http_api_port is not skipped else existing_http_api_port[0].id }}"

    - name: Find any stale HTTP port with port number 9000
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/http_ports/?number=9000"
        method: GET
        user: "{{ gateway_username }}"
        password: "{{ gateway_password }}"
        validate_certs: "{{ gateway_validate_certs | bool }}"
        force_basic_auth: true
        status_code: 200
      delegate_to: localhost
      register: _stale_9000_result

    - name: Delete stale HTTP port 9000 if left over from a previous test run
      ansible.platform.http_port:
        name: "{{ _stale_9000_result.json.results[0].name }}"
        state: absent
      when: _stale_9000_result.json.results | length > 0

    - name: Create an HTTP Port
      ansible.platform.http_port:
        name: "{{ name_prefix }}-Http_Port"
        number: 9000
      register: port1
    # </Http Ports> -------------------------------

    # <Service Clusters> --------------------------
    - name: Create Hub Service Type
      ansible.platform.service_type:
        name: "{{ test_id }}hub"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      register: hub_st

    - name: Create Hub Service Cluster
      ansible.platform.service_cluster:
        name: "{{ name_prefix }}-Hub"
        service_type: "{{ hub_st.service_type.id }}"
      register: hub_sc

    - name: Create Controller Service Type
      ansible.platform.service_type:
        name: "{{ test_id }}controller"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      register: controller_st

    - name: Create Controller Service Cluster
      ansible.platform.service_cluster:
        name: "{{ name_prefix }}-Controller"
        service_type: "{{ controller_st.service_type.id }}"
      register: controller_sc
    # </Service Clusters> -------------------------

    # <Services> ----------------------------------
    - name: Create Hub Service with check mode
      ansible.platform.service:
        name: "{{ name_prefix }}-Automation Hub API"
        description: "Proxy to the Automation Hub"
        http_port: "{{ api_port_id }}"
        api_slug: hub
        service_cluster: "{{ hub_sc.service_cluster.id }}"
        service_path: '/api/hub/'
        service_port: 5001
        order: 1
      check_mode: true

    - name: Search for the Hub Service (verify check_mode did not create it)
      ansible.platform.service:
        name: "{{ name_prefix }}-Automation Hub API"
        state: exists
      register: check_hub_service_exists

    - name: Assert that Hub Service does not exist
      ansible.builtin.assert:
        that:
          - not check_hub_service_exists.exists
        fail_msg: "Service '{{ name_prefix }}-Automation Hub API' exists in the system!"

    - name: Find any stale service with api_slug 'hub' left over from a previous run
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/services/?api_slug=hub"
        method: GET
        user: "{{ gateway_username }}"
        password: "{{ gateway_password }}"
        validate_certs: "{{ gateway_validate_certs | bool }}"
        force_basic_auth: true
        status_code: 200
      delegate_to: localhost
      register: _stale_hub_svc_result

    - name: Delete stale hub service if left over from a previous test run
      ansible.platform.service:
        name: "{{ _stale_hub_svc_result.json.results[0].name }}"
        state: absent
      when: _stale_hub_svc_result.json.results | length > 0

    - name: Create Hub Service
      ansible.platform.service:
        name: "{{ name_prefix }}-Automation Hub API"
        description: "Proxy to the Automation Hub"
        http_port: "{{ api_port_id }}"
        api_slug: hub
        service_cluster: "{{ hub_sc.service_cluster.id }}"
        service_path: '/api/hub/'
        service_port: 5001
        order: 1
      register: hub_service

    - name: Assert that we created a new service
      ansible.builtin.assert:
        that:
          - hub_service is changed

    - name: Recreate Hub Service
      ansible.platform.service:
        name: "{{ hub_service.service.name }}"
        description: "Proxy to the Automation Hub"
        http_port: "{{ api_port_id }}"
        api_slug: hub
        service_cluster: "{{ hub_sc.service_cluster.id }}"
        service_path: '/api/hub/'
        service_port: 5001
        order: 1
      register: recreate_hub_service

    - name: Assert that we were idempotent
      ansible.builtin.assert:
        that:
          - recreate_hub_service is not changed

    - name: Find any stale service with api_slug 'controller' left over from a previous run
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/services/?api_slug=controller"
        method: GET
        user: "{{ gateway_username }}"
        password: "{{ gateway_password }}"
        validate_certs: "{{ gateway_validate_certs | bool }}"
        force_basic_auth: true
        status_code: 200
      delegate_to: localhost
      register: _stale_controller_svc_result

    - name: Delete stale controller service if left over from a previous test run
      ansible.platform.service:
        name: "{{ _stale_controller_svc_result.json.results[0].name }}"
        state: absent
      when: _stale_controller_svc_result.json.results | length > 0

    - name: Create Controller Service
      ansible.platform.service:
        name: "{{ name_prefix }}-Controller API"
        description: Proxy to the Controller
        api_slug: controller
        http_port: "{{ api_port_id }}"
        service_cluster: "{{ controller_sc.service_cluster.name }}"
        is_service_https: true
        service_path: '/api/'
        service_port: 8043
      register: controller_service

    - name: Assert that we changed the system
      ansible.builtin.assert:
        that:
          - controller_service is changed

    - name: Check existing does not change
      ansible.platform.service:
        name: "{{ hub_service.service.name }}"
        order: 99
        state: exists
      register: exists_hub_service

    - name: Assert that existing won't change the state
      ansible.builtin.assert:
        that:
          - exists_hub_service is not changed

    - name: Change the API version for controller
      ansible.platform.service:
        name: "{{ controller_service.service.name }}"
        http_port: "{{ api_port_id }}"
        service_cluster: "{{ controller_sc.service_cluster.id }}"
        is_service_https: true
        service_path: '/api/v3/'
        service_port: 8043
      register: change_controller_service

    - name: Assert that we changed the existing service cluster
      ansible.builtin.assert:
        that:
          - change_controller_service is changed
          - change_controller_service.service.id == controller_service.service.id

    - name: Try to delete to a non-existent service
      ansible.platform.service:
        name: "{{ name_prefix }}-DNE"
        state: absent
      register: delete

    - name: Assert that we didn't change the system
      ansible.builtin.assert:
        that:
          - delete is not changed

    - name: Delete a service
      ansible.platform.service:
        name: "{{ hub_service.service.name }}"
        state: absent
      register: delete

    - name: Assert that we changed the system
      ansible.builtin.assert:
        that:
          - delete is changed

    - name: Rename Services
      ansible.platform.service:
        name: "{{ controller_service.service.name }}"
        new_name: "{{ controller_service.service.name }}-New"
      register: rename_controller_service

    - name: Assert that we changed the existing service
      ansible.builtin.assert:
        that:
          - rename_controller_service is changed
          - rename_controller_service.service.id == controller_service.service.id

    ### Test request_timeout_seconds ###
    - name: Set request_timeout_seconds on a service
      ansible.platform.service:
        name: "{{ controller_service.name }}-New"
        request_timeout_seconds: 3600
      register: __service_timeout_result

    - name: Assert request_timeout_seconds was set
      ansible.builtin.assert:
        that:
          - __service_timeout_result is changed

    - name: Set request_timeout_seconds again (idempotency)
      ansible.platform.service:
        name: "{{ controller_service.name }}-New"
        request_timeout_seconds: 3600
      register: __service_timeout_idempotent_result

    - name: Assert request_timeout_seconds idempotency
      ansible.builtin.assert:
        that:
          - __service_timeout_idempotent_result is not changed
        fail_msg: >
          Idempotency check failed for request_timeout_seconds.
          The API returned request_timeout_seconds={{ __service_timeout_idempotent_result.service.request_timeout_seconds }}
          after the update; the task should have been a no-op.
      # Only assert idempotency when the gateway API actually persisted the field.
      # Some gateway versions silently ignore request_timeout_seconds on services
      # (always returning null); in those environments the comparison always sees
      # null vs 3600 and will keep triggering spurious updates.  Skip this assertion
      # when the field came back null after the first set so the test doesn't fail
      # on unsupporting gateway versions.
      when: __service_timeout_result.service.request_timeout_seconds is not none

    - name: Update request_timeout_seconds to a new value
      ansible.platform.service:
        name: "{{ controller_service.name }}-New"
        request_timeout_seconds: 7200
      register: __service_timeout_update_result

    - name: Assert request_timeout_seconds was updated
      ansible.builtin.assert:
        that:
          - __service_timeout_update_result is changed

  always:
    # <Cleanup> -----------------------------------
    ### Delete Services ###
    # hub_service was explicitly deleted mid-test; this handles cases where the
    # test aborted before that deletion.
    - name: Delete hub service
      ansible.platform.service:
        state: absent
        name: "{{ hub_service.service.name }}"
      when: "hub_service is defined and 'service' in hub_service"

    # controller_service may have been renamed; delete both the original and
    # renamed forms so nothing is left behind regardless of how far the test got.
    - name: Delete controller service (original name)
      ansible.platform.service:
        state: absent
        name: "{{ controller_service.service.name }}"
      when: "controller_service is defined and 'service' in controller_service"

    - name: Delete controller service (renamed form, if rename succeeded)
      ansible.platform.service:
        state: absent
        name: "{{ rename_controller_service.service.name }}"
      when: "rename_controller_service is defined and 'service' in rename_controller_service"

    ### Delete Clusters ###
    - name: Delete Service Clusters
      ansible.platform.service_cluster:
        state: absent
        name: "{{ vars[item].service_cluster.name }}"
      loop:
        - "hub_sc"
        - "controller_sc"
      when: "item in vars and 'service_cluster' in vars[item]"

    ### Delete Ports ###
    - name: Delete Non-API Http Ports
      ansible.platform.http_port:
        name: "{{ vars[item].http_port.name }}"
        state: absent
      when: "item in vars and 'http_port' in vars[item]"
      loop:
        - "port1"
        - "new_http_api_port"

    - name: Delete Service Types
      ansible.platform.service_type:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gateway_service_types }}"
      vars:
        gateway_service_types:
          - name: "{{ test_id }}controller"
          - name: "{{ test_id }}hub"
...
