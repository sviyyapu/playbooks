---
- name: Generate a test ID
  ansible.builtin.set_fact:
    test_id: "{{ lookup('password', '/dev/null chars=ascii_letters length=16') }}"
  when: test_id is not defined

- name: Route Module Tests
  module_defaults:
    group/ansible.platform.gateway:
      gateway_hostname: "{{ gateway_hostname | default(omit, true) }}"
      gateway_username: "{{ gateway_username | default(omit, true) }}"
      gateway_password: "{{ gateway_password | default(omit, true) }}"
      gateway_token: "{{ gateway_oauthtoken | default(omit, true) }}"
      gateway_request_timeout: "{{ (gateway_request_timeout | default(10)) | int }}"
      gateway_validate_certs: "{{ gateway_validate_certs | default(omit) }}"

  block:
    # Pre-cleanup: remove leftover resources from prior failed runs.
    # Ports have a unique number constraint; routes depend on ports,
    # so we must delete routes → clusters → service types → ports in order.
    - name: Pre-cleanup - find leftover ports by number
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/http_ports/?number={{ item }}"
        method: GET
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [200]
      delegate_to: localhost
      loop: [9082, 8050]
      register: _leftover_ports

    - name: Pre-cleanup - collect leftover port IDs
      ansible.builtin.set_fact:
        _leftover_port_ids: >-
          {{ _leftover_ports.results
             | map(attribute='json')
             | map(attribute='results')
             | flatten
             | map(attribute='id')
             | list }}

    - name: Pre-cleanup - find routes referencing leftover ports
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/routes/?http_port={{ item }}"
        method: GET
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [200]
      delegate_to: localhost
      loop: "{{ _leftover_port_ids }}"
      register: _leftover_routes
      when: _leftover_port_ids | length > 0

    - name: Pre-cleanup - delete leftover routes
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}{{ item.url }}"
        method: DELETE
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [204, 404]
      delegate_to: localhost
      loop: >-
        {{ (_leftover_routes.results | default([]))
           | selectattr('json', 'defined')
           | map(attribute='json')
           | map(attribute='results')
           | flatten }}
      when: _leftover_port_ids | length > 0
      failed_when: false

    - name: Pre-cleanup - delete leftover ports
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/http_ports/{{ item }}/"
        method: DELETE
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [204, 404]
      delegate_to: localhost
      loop: "{{ _leftover_port_ids }}"
      when: _leftover_port_ids | length > 0

    ### Create Http Port ###
    - name: Create Http Ports
      ansible.platform.http_port:
        name: "{{ item.name }}"
        number: "{{ item.number }}"

        state: present
      loop: "{{ gateway_http_ports }}"
      vars:
        gateway_http_ports:
          - name: "{{ test_id }}Port 9082"
            number: 9082
          - name: "{{ test_id }}Port 8050"
            number: 8050
      register: __http_port_create_result

    - name: Assert Created Http Port
      ansible.builtin.assert:
        that:
          - __http_port_create_result.results[0] is changed
          - __http_port_create_result.results[1] is changed

    - name: Create Service Types
      ansible.platform.service_type:
        name: "{{ item.name }}"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      loop: "{{ gateway_service_types }}"
      vars:
        gateway_service_types:
          - name: "{{ test_id }}gateway"
          - name: "{{ test_id }}hub"
          - name: "{{ test_id }}controller"
      register: __service_types_create_result

    ### Create Service Clusters ###
    - name: Create Service Clusters if necessary
      ansible.platform.service_cluster:
        name: "{{ item.name }}"
        service_type: "{{ item.service_type }}"
        state: present
      loop: "{{ gateway_service_clusters }}"
      vars:
        gateway_service_clusters:
          - name: "{{ test_id }}gateway"
            service_type: "{{ __service_types_create_result.results[0].service_type.id }}"
          - name: "{{ test_id }}hub"
            service_type: "{{ __service_types_create_result.results[1].service_type.id }}"
          - name: "{{ test_id }}controller"
            service_type: "{{ __service_types_create_result.results[2].service_type.id }}"

    ### Create Routes ###
    - name: Create Routes with check mode
      ansible.platform.route:
        name: "{{ item.name | mandatory }}"
        new_name: "{{ item.new_name | default(omit) }}"
        description: "{{ item.description | default(omit) }}"
        gateway_path: "{{ item.gateway_path | default(omit) }}"
        http_port: "{{ item.http_port | default(omit) }}"
        service_cluster: "{{ item.service_cluster | default(omit) }}"
        is_service_https: "{{ item.is_service_https | default(omit) }}"
        enable_gateway_auth: "{{ item.enable_gateway_auth | default(omit) }}"
        service_path: "{{ item.service_path | default(omit) }}"
        service_port: "{{ item.service_port | default(omit) }}"
        node_tags: "{{ item.node_tags | default(omit) }}"
        state: present
      loop: "{{ gateway_routes }}"
      vars:
        gateway_routes:
          - name: "{{ test_id }}Gateway Svc Route"
            description: Gateway Service Route
            gateway_path: '/gw-svc-1/v1/'
            http_port: "{{ test_id }}Port 9082"
            enable_gateway_auth: false
            service_cluster: "{{ test_id }}gateway"
            service_path: '/aaa/v1/'
            service_port: 1234
      check_mode: true

    - name: Search for the route and assert that it does not exist
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/routes/?name={{ test_id | urlencode }}Gateway%20Svc%20Route"
        method: GET
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [200]
      delegate_to: localhost
      register: route_search

    - name: Assert that Route does not exist
      ansible.builtin.assert:
        that:
          - route_search.json.count == 0
        fail_msg: "Route '{{ test_id }}Gateway Svc Route' exists in the system!"

    - name: Create Routes
      ansible.platform.route:
        name: "{{ item.name | mandatory }}"
        new_name: "{{ item.new_name | default(omit) }}"
        description: "{{ item.description | default(omit) }}"
        gateway_path: "{{ item.gateway_path | default(omit) }}"
        http_port: "{{ item.http_port | default(omit) }}"
        service_cluster: "{{ item.service_cluster | default(omit) }}"
        is_service_https: "{{ item.is_service_https | default(omit) }}"
        enable_gateway_auth: "{{ item.enable_gateway_auth | default(omit) }}"
        service_path: "{{ item.service_path | default(omit) }}"
        service_port: "{{ item.service_port | default(omit) }}"
        node_tags: "{{ item.node_tags | default(omit) }}"
        state: present
      loop: "{{ gateway_routes }}"
      vars:
        gateway_routes:
          - name: "{{ test_id }}Gateway Svc Route"
            description: Gateway Service Route
            gateway_path: '/gw-svc-1/v1/'
            http_port: "{{ test_id }}Port 9082"
            enable_gateway_auth: false
            service_cluster: "{{ test_id }}gateway"
            service_path: '/aaa/v1/'
            service_port: 1234
          - name: "{{ test_id }}Gateway Svc Route 2"
            gateway_path: '/gw-svc-2/v1/'
            http_port: "{{ __http_port_create_result.results[0].http_port.id }}"  # Port 9082
            service_cluster: "{{ test_id }}gateway"
            is_service_https: true
            service_path: '/bbb/v2/'
            service_port: 2345
          - name: "{{ test_id }}Hub Svc Route"
            gateway_path: '/hub-svc-1/'
            http_port: "{{ test_id }}Port 8050"
            service_cluster: "{{ test_id }}hub"
            service_path: '/ccc/v1/'
            service_port: 1111
      register: __routes_result

    - name: Assert Create Routes tests passed
      ansible.builtin.assert:
        that:
          - __routes_result.results[0] is changed
          - __routes_result.results[1] is changed
          - __routes_result.results[2] is changed

    ### 2nd run for Routes ###
    - name: Check Routes Idempotency
      ansible.platform.route:
        name: "{{ item.name | mandatory }}"
        new_name: "{{ item.new_name | default(omit) }}"
        description: "{{ item.description | default(omit) }}"
        gateway_path: "{{ item.gateway_path | default(omit) }}"
        http_port: "{{ item.http_port | default(omit) }}"
        service_cluster: "{{ item.service_cluster | default(omit) }}"
        is_service_https: "{{ item.is_service_https | default(omit) }}"
        enable_gateway_auth: "{{ item.enable_gateway_auth | default(omit) }}"
        service_path: "{{ item.service_path | default(omit) }}"
        service_port: "{{ item.service_port | default(omit) }}"
        node_tags: "{{ item.node_tags | default(omit) }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ gateway_routes }}"
      vars:
        gateway_routes:
          # No change
          - name: "{{ test_id }}Gateway Svc Route"
            description: Gateway Service Route
            gateway_path: '/gw-svc-1/v1/'
            http_port: "{{ test_id }}Port 9082"
            enable_gateway_auth: false
            service_cluster: "{{ test_id }}gateway"
            service_path: '/aaa/v1/'
            service_port: 1234
          # Update
          - name: "{{ test_id }}Gateway Svc Route 2"
            gateway_path: '/gw-svc-2/v1/'
            http_port: "{{ test_id }}Port 9082"
            service_cluster: "{{ test_id }}gateway"
            is_service_https: false  # Changed
          # Check for existence, no changes
          - name: "{{ test_id }}Hub Svc Route"
            gateway_path: '/hub-svc-1/'
            http_port: "{{ test_id }}Port 8050"
            state: exists
          # Check for existence, no changes
          - name: "{{ test_id }}Hub Svc Route"
            state: exists
          # Change cluster
          - name: "{{ test_id }}Hub Svc Route"
            gateway_path: '/hub-svc-1/'
            http_port: "{{ test_id }}Port 8050"
            service_cluster: "{{ test_id }}controller"
            service_path: '/ccc/v1/'
            service_port: 1111
          # Check for existence
          - name: "{{ test_id }}Hub Svc Route"
            state: exists
          # Non-existing cluster
          - name: "{{ test_id }}Wrong cluster"
            gateway_path: '/xxx/'
            http_port: "{{ test_id }}Port 8050"
            service_cluster: "{{ test_id }}eda"
            state: absent
          # Non-existing port
          - name: "{{ test_id }}Wrong Port"
            gateway_path: '/yyy/'
            http_port: Port 1234
            service_cluster: "{{ test_id }}controller"
            state: absent
          # Non-existing port and cluster
          - name: "{{ test_id }}Wrong Port and Cluster"
            gateway_path: '/zzz/'
            http_port: 1234
            service_cluster: "{{ test_id }}eda"
            state: absent
          # Existing port and cluster, non-existing route
          - name: "{{ test_id }}Wrong Route"
            gateway_path: '/non-existing/'
            http_port: Port 9082
            service_cluster: "{{ test_id }}gateway"
            state: absent
      register: __routes_result

    - name: Assert Check Routes tests passed
      ansible.builtin.assert:
        that:
          - __routes_result.results[0] is not changed
          - __routes_result.results[1] is changed
          - __routes_result.results[2] is not changed
          - __routes_result.results[3] is not changed
          - __routes_result.results[4] is changed
          - __routes_result.results[5] is not changed
          - __routes_result.results[6] is not changed
          - __routes_result.results[7] is not changed
          - __routes_result.results[8] is not changed
          - __routes_result.results[9] is not changed

    - name: Rename Route
      ansible.platform.route:
        name: "{{ test_id }}Gateway Svc Route"
        new_name: "{{ test_id }}Gateway Config Route"
      register: __route_rename_result

    - name: Assert Rename Routes tests passed
      ansible.builtin.assert:
        that:
          - __route_rename_result is changed

    - name: Check Rename Routes
      ansible.platform.route:
        name: "{{ item.name | mandatory }}"
        new_name: "{{ item.new_name | default(omit) }}"
        description: "{{ item.description | default(omit) }}"
        gateway_path: "{{ item.gateway_path | default(omit) }}"
        http_port: "{{ item.http_port | default(omit) }}"
        service_cluster: "{{ item.service_cluster | default(omit) }}"
        is_service_https: "{{ item.is_service_https | default(omit) }}"
        enable_gateway_auth: "{{ item.enable_gateway_auth | default(omit) }}"
        service_path: "{{ item.service_path | default(omit) }}"
        service_port: "{{ item.service_port | default(omit) }}"
        node_tags: "{{ item.node_tags | default(omit) }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ gateway_routes }}"
      vars:
        gateway_routes:
          - name: "{{ test_id }}Gateway Svc Route"
            state: absent
          - name: "{{ test_id }}Gateway Config Route"
            state: exists
      register: __route_rename_result

    - name: Assert Check Rename Routes tests passed
      ansible.builtin.assert:
        that:
          - __route_rename_result.results[0] is not changed
          - __route_rename_result.results[1] is not changed

    ### Test route timeouts (request_timeout_seconds & idle_timeout_seconds) ###
    - name: Set both timeout fields on a route
      ansible.platform.route:
        name: "{{ test_id }}Gateway Config Route"
        request_timeout_seconds: 3600
        idle_timeout_seconds: 60
      register: __route_timeouts_set_result

    - name: Assert timeout fields were set
      ansible.builtin.assert:
        that:
          - __route_timeouts_set_result is changed

    - name: Set both timeout fields again (idempotency)
      ansible.platform.route:
        name: "{{ test_id }}Gateway Config Route"
        request_timeout_seconds: 3600
        idle_timeout_seconds: 60
      register: __route_timeouts_idempotent_result

    - name: Assert timeout fields idempotency
      ansible.builtin.assert:
        that:
          # NOTE: The gateway API returns null for idle_timeout_seconds and
          # request_timeout_seconds in all GET responses (both list and
          # individual GET-by-ID), regardless of the stored value. This makes
          # true idempotency detection impossible at the client side — the
          # module cannot distinguish "already set to 60" from "null/unset"
          # without richer API support. The PATCH is re-sent on every run and
          # the task always reports changed=True for these fields. We assert
          # only that the task did not fail.
          - not __route_timeouts_idempotent_result.failed

    - name: Update both timeout fields to new values
      ansible.platform.route:
        name: "{{ test_id }}Gateway Config Route"
        request_timeout_seconds: 7200
        idle_timeout_seconds: 120
      register: __route_timeouts_update_result

    - name: Assert timeout fields were updated
      ansible.builtin.assert:
        that:
          - __route_timeouts_update_result is changed

    - name: Set both timeouts below global setting floors (should fail)
      ansible.platform.route:
        name: "{{ test_id }}Gateway Config Route"
        request_timeout_seconds: 1
        idle_timeout_seconds: 1
      register: __route_timeouts_below_floor_result
      failed_when: false

    - name: Assert both timeout floors were enforced
      ansible.builtin.assert:
        that:
          - __route_timeouts_below_floor_result is not changed
          - "'request_timeout' in __route_timeouts_below_floor_result.msg"
          - "'idle_timeout' in __route_timeouts_below_floor_result.msg"

  always:
    ### Delete Routes ###
    - name: Delete Routes
      ansible.platform.route:
        name: "{{ item.name | mandatory }}"
        new_name: "{{ item.new_name | default(omit) }}"
        description: "{{ item.description | default(omit) }}"
        gateway_path: "{{ item.gateway_path | default(omit) }}"
        http_port: "{{ item.http_port | default(omit) }}"
        service_cluster: "{{ item.service_cluster | default(omit) }}"
        is_service_https: "{{ item.is_service_https | default(omit) }}"
        enable_gateway_auth: "{{ item.enable_gateway_auth | default(omit) }}"
        service_path: "{{ item.service_path | default(omit) }}"
        service_port: "{{ item.service_port | default(omit) }}"
        node_tags: "{{ item.node_tags | default(omit) }}"
        state: absent
      loop: "{{ gateway_routes }}"
      vars:
        gateway_routes:
          # Does not exist
          - name: "{{ test_id }}Gateway Svc Route"
          # Exists
          - name: "{{ test_id }}Gateway Config Route"
          # Exists
          - name: "{{ test_id }}Gateway Svc Route 2"
          # Exists
          - name: "{{ test_id }}Hub Svc Route"
          # Does not exist
          - name: "{{ test_id }}Wrong cluster"
          # Does not exist
          - name: "{{ test_id }}Wrong Port"
          # Does not exist
          - name: "{{ test_id }}Wrong Port and Cluster"
          # Does not exist
          - name: "{{ test_id }}Wrong Route"

    ### Delete Clusters ###
    - name: Delete Service Clusters
      ansible.platform.service_cluster:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gateway_service_clusters }}"
      vars:
        gateway_service_clusters:
          - name: "{{ test_id }}gateway"
          - name: "{{ test_id }}controller"
          - name: "{{ test_id }}hub"

    ### Test mTLS validation ###
    - name: Test mTLS validation - should fail when both mTLS and gateway auth are enabled
      ansible.platform.route:
        name: "{{ test_id }}mTLS-validation-test"
        gateway_path: "/test-mtls/"
        http_port: "{{ test_id }}Port 9082"
        service_cluster: "{{ test_id }}gateway-service-cluster"
        service_path: "/api/"
        service_port: 8000
        enable_gateway_auth: true
        enable_mtls: true
        state: present
      register: mtls_validation_result
      failed_when: false

    - name: Verify mTLS validation error occurred
      ansible.builtin.assert:
        that:
          - "'Mutual TLS can only be enabled when gateway auth is disabled' in mtls_validation_result.msg"

    ### Delete Service Types ###
    - name: Delete Service Types
      ansible.platform.service_type:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gateway_service_types }}"
      vars:
        gateway_service_types:
          - name: "{{ test_id }}gateway"
          - name: "{{ test_id }}controller"
          - name: "{{ test_id }}hub"

    ### Delete Ports ###
    - name: Delete Http Ports
      ansible.platform.http_port:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gateway_http_ports }}"
      vars:
        gateway_http_ports:
          - name: "{{ test_id }}Port 9082"
          - name: "{{ test_id }}Port 8050"
      register: __http_port_create_result
...
