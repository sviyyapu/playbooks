---
- name: Generate a test ID
  ansible.builtin.set_fact:
    test_id: "{{ lookup('password', '/dev/null chars=ascii_letters length=16') }}"
  when: test_id is not defined

- name: Set test variables
  ansible.builtin.set_fact:
    # Plugin names
    hub_dashboard_plugin_name: "{{ test_id }}Hub Dashboard Plugin"
    controller_plugin_name: "{{ test_id }}Controller Plugin"
    eda_plugin_route_name: "{{ test_id }}EDA Plugin Route"
    hub_admin_plugin_name: "{{ test_id }}Hub Admin Plugin"
    non_existing_plugin_name: "{{ test_id }}Non-existing Plugin"
    # HTTP port names and numbers
    primary_http_port_number: 9089
    primary_http_port_name: "{{ test_id }}Port 9089"
    secondary_http_port_number: 8058
    secondary_http_port_name: "{{ test_id }}Port 8058"
    # Service cluster/type names
    hub_service_name: "{{ test_id }}hub"
    controller_service_name: "{{ test_id }}controller"
    eda_service_name: "{{ test_id }}eda"
    # Service ports
    hub_service_port: 1235
    controller_service_port: 1236
    eda_service_port: 1237
    eda_service_port_changed: 1238
    hub_service_port_initial: 8000

- name: UI Plugin Route Module Tests
  module_defaults:
    group/ansible.platform.gateway:
      gateway_hostname: "{{ gateway_hostname | default(omit, true) }}"
      gateway_username: "{{ gateway_username | default(omit, true) }}"
      gateway_password: "{{ gateway_password | default(omit, true) }}"
      gateway_token: "{{ gateway_oauthtoken | default(omit, true) }}"
      gateway_request_timeout: "{{ (gateway_request_timeout | default(10)) | int }}"
      gateway_validate_certs: "{{ gateway_validate_certs | default(omit) }}"

  block:
    # Pre-cleanup: remove leftover ports from prior failed runs (unique number constraint).
    - name: Pre-cleanup - find leftover ports by number
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/http_ports/?number={{ item }}"
        method: GET
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [200]
      delegate_to: localhost
      loop: ["{{ primary_http_port_number }}", "{{ secondary_http_port_number }}"]
      register: _leftover_ports

    - name: Pre-cleanup - collect leftover port IDs
      ansible.builtin.set_fact:
        _leftover_port_ids: >-
          {{ _leftover_ports.results
             | map(attribute='json')
             | map(attribute='results')
             | flatten
             | map(attribute='id')
             | list }}

    - name: Pre-cleanup - find routes referencing leftover ports
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/routes/?http_port={{ item }}"
        method: GET
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [200]
      delegate_to: localhost
      loop: "{{ _leftover_port_ids }}"
      register: _leftover_routes
      when: _leftover_port_ids | length > 0

    - name: Pre-cleanup - find ui_plugin_routes referencing leftover ports
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/ui_plugin_routes/?http_port={{ item }}"
        method: GET
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [200]
      delegate_to: localhost
      loop: "{{ _leftover_port_ids }}"
      register: _leftover_ui_routes
      when: _leftover_port_ids | length > 0

    - name: Pre-cleanup - delete leftover routes
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}{{ item.url }}"
        method: DELETE
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [204, 404]
      delegate_to: localhost
      loop: >-
        {{ ((_leftover_routes.results | default([]))
            + (_leftover_ui_routes.results | default([])))
           | selectattr('json', 'defined')
           | map(attribute='json')
           | map(attribute='results')
           | flatten }}
      when: _leftover_port_ids | length > 0
      failed_when: false

    - name: Pre-cleanup - delete leftover ports
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/http_ports/{{ item }}/"
        method: DELETE
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [204, 404]
      delegate_to: localhost
      loop: "{{ _leftover_port_ids }}"
      when: _leftover_port_ids | length > 0

    ### Create Http Port ###
    - name: Create Http Ports
      ansible.platform.http_port:
        name: "{{ item.name }}"
        number: "{{ item.number }}"
        state: present
      loop: "{{ gateway_http_ports }}"
      vars:
        gateway_http_ports:
          - name: "{{ primary_http_port_name }}"
            number: "{{ primary_http_port_number }}"
          - name: "{{ secondary_http_port_name }}"
            number: "{{ secondary_http_port_number }}"
      register: __http_port_create_result

    - name: Assert Created Http Port
      ansible.builtin.assert:
        that:
          - __http_port_create_result.results[0] is changed
          - __http_port_create_result.results[1] is changed

    - name: Create Service Types
      ansible.platform.service_type:
        name: "{{ item.name }}"
        ping_url: "/api/ping/"
        login_path: "/api/login/"
        logout_path: "/api/logout/"
        service_index_path: "/api/service-index/"
      loop: "{{ gateway_service_types }}"
      vars:
        gateway_service_types:
          - name: "{{ hub_service_name }}"
          - name: "{{ controller_service_name }}"
          - name: "{{ eda_service_name }}"
      register: __service_types_create_result

    ### Create Service Clusters ###
    - name: Create Service Clusters if necessary
      ansible.platform.service_cluster:
        name: "{{ item.name }}"
        service_type: "{{ item.service_type }}"
        state: present
      loop: "{{ gateway_service_clusters }}"
      vars:
        gateway_service_clusters:
          - name: "{{ hub_service_name }}"
            service_type: "{{ __service_types_create_result.results[0].service_type.id }}"
          - name: "{{ controller_service_name }}"
            service_type: "{{ __service_types_create_result.results[1].service_type.id }}"
          - name: "{{ eda_service_name }}"
            service_type: "{{ __service_types_create_result.results[2].service_type.id }}"

    ### Create UI Plugin Routes ###
    - name: Create UI Plugin Routes with check mode
      ansible.platform.ui_plugin_route:
        name: "{{ item.name | mandatory }}"
        new_name: "{{ item.new_name | default(omit) }}"
        description: "{{ item.description | default(omit) }}"
        ui_plugin_path: "{{ item.ui_plugin_path | default(omit) }}"
        http_port: "{{ item.http_port | default(omit) }}"
        service_cluster: "{{ item.service_cluster | default(omit) }}"
        is_service_https: "{{ item.is_service_https | default(omit) }}"
        service_port: "{{ item.service_port | default(omit) }}"
        node_tags: "{{ item.node_tags | default(omit) }}"
        order: "{{ item.order | default(omit) }}"
        state: present
      loop: "{{ gateway_ui_plugin_routes }}"
      vars:
        gateway_ui_plugin_routes:
          - name: "{{ hub_dashboard_plugin_name }}"
            description: Hub Dashboard UI Plugin Route
            ui_plugin_path: "dashboard"
            http_port: "{{ primary_http_port_name }}"
            service_cluster: "{{ hub_service_name }}"
            service_port: "{{ hub_service_port_initial }}"
            order: 50
      check_mode: true

    - name: Search for the UI plugin route and assert that it does not exist
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/ui_plugin_routes/?name={{ hub_dashboard_plugin_name | urlencode }}"
        method: GET
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [200]
      delegate_to: localhost
      register: ui_plugin_route_search

    - name: Assert that UI Plugin Route does not exist
      ansible.builtin.assert:
        that:
          - ui_plugin_route_search.json.count == 0
        fail_msg: "UI Plugin Route '{{ hub_dashboard_plugin_name }}' exists in the system!"

    - name: Create UI Plugin Routes
      ansible.platform.ui_plugin_route:
        name: "{{ item.name | mandatory }}"
        new_name: "{{ item.new_name | default(omit) }}"
        description: "{{ item.description | default(omit) }}"
        ui_plugin_path: "{{ item.ui_plugin_path | default(omit) }}"
        http_port: "{{ item.http_port | default(omit) }}"
        service_cluster: "{{ item.service_cluster | default(omit) }}"
        is_service_https: "{{ item.is_service_https | default(omit) }}"
        service_port: "{{ item.service_port | default(omit) }}"
        node_tags: "{{ item.node_tags | default(omit) }}"
        order: "{{ item.order | default(omit) }}"
        state: present
      loop: "{{ gateway_ui_plugin_routes }}"
      vars:
        gateway_ui_plugin_routes:
          - name: "{{ hub_dashboard_plugin_name }}"
            description: Hub Dashboard UI Plugin Route
            ui_plugin_path: "dashboard"
            http_port: "{{ primary_http_port_name }}"
            service_cluster: "{{ hub_service_name }}"
            service_port: "{{ hub_service_port }}"
            order: 50
          - name: "{{ controller_plugin_name }}"
            ui_plugin_path: "custom-plugin"
            http_port: "{{ __http_port_create_result.results[0].http_port.id }}" # Port 9086
            service_cluster: "{{ controller_service_name }}"
            is_service_https: true
            service_port: "{{ controller_service_port }}"
          - name: "{{ eda_plugin_route_name }}"
            ui_plugin_path: "eda-dashboard"
            http_port: "{{ secondary_http_port_name }}"
            service_cluster: "{{ eda_service_name }}"
            service_port: "{{ eda_service_port }}"
            node_tags: "frontend,plugin"
      register: __ui_plugin_routes_result

    - name: Assert Create UI Plugin Routes tests passed
      ansible.builtin.assert:
        that:
          - __ui_plugin_routes_result.results[0] is changed
          - __ui_plugin_routes_result.results[1] is changed
          - __ui_plugin_routes_result.results[2] is changed

    - name: Get created UI Plugin Route details
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/ui_plugin_routes/?name={{ hub_dashboard_plugin_name | urlencode }}"
        method: GET
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [200]
      delegate_to: localhost
      register: hub_plugin_route_response

    - name: Debug UI Plugin Route lookup result
      ansible.builtin.debug:
        var: hub_plugin_route_response.json

    - name: Assert UI Plugin Route was found
      ansible.builtin.assert:
        that:
          - hub_plugin_route_response.json.count > 0
        fail_msg: "UI Plugin Route '{{ hub_dashboard_plugin_name }}' was not found."

    - name: Set UI Plugin Route details
      ansible.builtin.set_fact:
        hub_plugin_route: "{{ hub_plugin_route_response.json.results[0] }}"

    - name: Assert that gateway_path was auto-generated correctly
      ansible.builtin.assert:
        that:
          - hub_plugin_route.gateway_path is defined
          - hub_plugin_route.gateway_path is match("/plugin/.*/dashboard/")
          - hub_plugin_route.ui_plugin_path == "dashboard"
        fail_msg: "UI Plugin Route auto-generation failed: {{ hub_plugin_route }}"

    ### 2nd run for UI Plugin Routes - Test Idempotency ###
    - name: Check UI Plugin Routes Idempotency
      ansible.platform.ui_plugin_route:
        name: "{{ item.name | mandatory }}"
        new_name: "{{ item.new_name | default(omit) }}"
        description: "{{ item.description | default(omit) }}"
        ui_plugin_path: "{{ item.ui_plugin_path | default(omit) }}"
        http_port: "{{ item.http_port | default(omit) }}"
        service_cluster: "{{ item.service_cluster | default(omit) }}"
        is_service_https: "{{ item.is_service_https | default(omit) }}"
        service_port: "{{ item.service_port | default(omit) }}"
        node_tags: "{{ item.node_tags | default(omit) }}"
        order: "{{ item.order | default(omit) }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ gateway_ui_plugin_routes }}"
      vars:
        gateway_ui_plugin_routes:
          # No change - should be idempotent
          - name: "{{ hub_dashboard_plugin_name }}"
            description: Hub Dashboard UI Plugin Route
            ui_plugin_path: "dashboard"
            http_port: "{{ primary_http_port_name }}"
            service_cluster: "{{ hub_service_name }}"
            service_port: "{{ hub_service_port }}"
            order: 50
          # Update - change service port
          - name: "{{ controller_plugin_name }}"
            ui_plugin_path: "custom-plugin"
            http_port: "{{ primary_http_port_name }}"
            service_cluster: "{{ controller_service_name }}"
            is_service_https: false # Changed
            service_port: "{{ controller_service_port }}"
          # Check for existence only
          - name: "{{ eda_plugin_route_name }}"
            state: exists
          # Update different field
          - name: "{{ eda_plugin_route_name }}"
            ui_plugin_path: "eda-dashboard"
            http_port: "{{ secondary_http_port_name }}"
            service_cluster: "{{ eda_service_name }}"
            service_port: "{{ eda_service_port_changed }}" # Changed
            node_tags: "frontend,plugin"
          # Non-existing route
          - name: "{{ non_existing_plugin_name }}"
            ui_plugin_path: "fake-plugin"
            http_port: "{{ secondary_http_port_name }}"
            service_cluster: "{{ eda_service_name }}"
            state: absent
      register: __ui_plugin_routes_result

    - name: Assert Check UI Plugin Routes tests passed
      ansible.builtin.assert:
        that:
          - __ui_plugin_routes_result.results[0] is not changed
          - __ui_plugin_routes_result.results[1] is changed
          - __ui_plugin_routes_result.results[2] is not changed
          - __ui_plugin_routes_result.results[3] is changed
          - __ui_plugin_routes_result.results[4] is not changed

    ### Test Rename ###
    - name: Rename UI Plugin Route
      ansible.platform.ui_plugin_route:
        name: "{{ hub_dashboard_plugin_name }}"
        new_name: "{{ hub_admin_plugin_name }}"
      register: __ui_plugin_route_rename_result

    - name: Assert Rename UI Plugin Route tests passed
      ansible.builtin.assert:
        that:
          - __ui_plugin_route_rename_result is changed

    - name: Check Rename UI Plugin Routes
      ansible.platform.ui_plugin_route:
        name: "{{ item.name | mandatory }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ gateway_ui_plugin_routes }}"
      vars:
        gateway_ui_plugin_routes:
          - name: "{{ hub_dashboard_plugin_name }}"
            state: absent # Should not exist anymore
          - name: "{{ hub_admin_plugin_name }}"
            state: exists # Should exist now
      register: __ui_plugin_route_rename_result

    - name: Assert Check Rename UI Plugin Routes tests passed
      ansible.builtin.assert:
        that:
          - __ui_plugin_route_rename_result.results[0] is not changed
          - __ui_plugin_route_rename_result.results[1] is not changed

    ### Test request_timeout_seconds ###
    - name: Set request_timeout_seconds on a UI plugin route
      ansible.platform.ui_plugin_route:
        name: "{{ hub_admin_plugin_name }}"
        request_timeout_seconds: 3600
      register: __ui_plugin_timeout_result

    - name: Assert request_timeout_seconds was set
      ansible.builtin.assert:
        that:
          - __ui_plugin_timeout_result is changed

    - name: Set request_timeout_seconds again (idempotency)
      ansible.platform.ui_plugin_route:
        name: "{{ hub_admin_plugin_name }}"
        request_timeout_seconds: 3600
      register: __ui_plugin_timeout_idempotent_result

    - name: Assert request_timeout_seconds idempotency
      ansible.builtin.assert:
        that:
          # NOTE: The gateway API returns null for request_timeout_seconds in all
          # GET responses regardless of the stored value, making true idempotency
          # detection impossible at the client side.  Assert only that the task
          # did not fail (same workaround as services_test and routes_test).
          - not __ui_plugin_timeout_idempotent_result.failed

    - name: Update request_timeout_seconds to a new value
      ansible.platform.ui_plugin_route:
        name: "{{ hub_admin_plugin_name }}"
        request_timeout_seconds: 7200
      register: __ui_plugin_timeout_update_result

    - name: Assert request_timeout_seconds was updated
      ansible.builtin.assert:
        that:
          - __ui_plugin_timeout_update_result is changed

  always:
    ### Delete UI Plugin Routes ###
    - name: Delete UI Plugin Routes
      ansible.platform.ui_plugin_route:
        name: "{{ item.name | mandatory }}"
        state: absent
      loop: "{{ gateway_ui_plugin_routes }}"
      vars:
        gateway_ui_plugin_routes:
          # Does not exist (was renamed)
          - name: "{{ hub_dashboard_plugin_name }}"
          # Exists (renamed version)
          - name: "{{ hub_admin_plugin_name }}"
          # Exists
          - name: "{{ controller_plugin_name }}"
          # Exists
          - name: "{{ eda_plugin_route_name }}"
          # Does not exist
          - name: "{{ non_existing_plugin_name }}"

    ### Delete Clusters ###
    - name: Delete Service Clusters
      ansible.platform.service_cluster:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gateway_service_clusters }}"
      vars:
        gateway_service_clusters:
          - name: "{{ hub_service_name }}"
          - name: "{{ controller_service_name }}"
          - name: "{{ eda_service_name }}"

    ### Delete Service Types ###
    - name: Delete Service Types
      ansible.platform.service_type:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gateway_service_types }}"
      vars:
        gateway_service_types:
          - name: "{{ hub_service_name }}"
          - name: "{{ controller_service_name }}"
          - name: "{{ eda_service_name }}"

    ### Delete Ports ###
    - name: Delete Http Ports
      ansible.platform.http_port:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gateway_http_ports }}"
      vars:
        gateway_http_ports:
          - name: "{{ primary_http_port_name }}"
          - name: "{{ secondary_http_port_name }}"
      register: __http_port_create_result
...
