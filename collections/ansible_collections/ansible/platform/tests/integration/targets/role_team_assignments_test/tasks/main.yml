---
# Platform modules (organization, team, role_team_assignment) use API calls to the gateway.
# Run with connection: local so tasks execute on the controller and can reach the gateway.
- name: Run Test
  module_defaults:
    group/ansible.platform.gateway:
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs | bool }}"

  vars:
    ansible_connection: local

  block:

    # --------------------------------------------------------------------------
    # Setup
    # --------------------------------------------------------------------------
    - name: Generate a unique test ID
      ansible.builtin.set_fact:
        test_id: "{{ lookup('password', '/dev/null chars=ascii_letters length=16') }}"
      when: test_id is not defined

    - name: Preset variables for test resource names
      ansible.builtin.set_fact:
        organization_name: "GW-Collection-Test-Organization-{{ test_id }}"
        team_name_prefix: "GW-Collection-Test-Team-{{ test_id }}"
        custom_role_name: "GW-Custom-Role-{{ test_id }}"

    # --------------------------------------------------------------------------
    # Organizations
    # --------------------------------------------------------------------------
    - name: Create Organization 1
      ansible.platform.organization:
        name: "{{ organization_name }}-1"
      register: org1

    - name: Create Organization 2
      ansible.platform.organization:
        name: "{{ organization_name }}-2"
      register: org2

    - name: Create Organization 3
      ansible.platform.organization:
        name: "{{ organization_name }}-3"
      register: org3

    - name: Create Organization 4
      ansible.platform.organization:
        name: "{{ organization_name }}-4"
      register: org4

    - name: Assert organizations were created
      ansible.builtin.assert:
        that:
          - org1 is changed
          - org2 is changed
          - org3 is changed
          - org4 is changed

    # --------------------------------------------------------------------------
    # Teams
    # --------------------------------------------------------------------------
    - name: Create Team 1 in Organization 1
      ansible.platform.team:
        name: "{{ team_name_prefix }}-Team-1"
        organization: "{{ org1.organization.name }}"
        description: "Test Team 1"
      register: team1

    - name: Create Team 2 in Organization 2
      ansible.platform.team:
        name: "{{ team_name_prefix }}-Team-2"
        organization: "{{ org2.organization.name }}"
        description: "Test Team 2"
      register: team2

    - name: Create Team 3 in Organization 3
      ansible.platform.team:
        name: "{{ team_name_prefix }}-Team-3"
        organization: "{{ org3.organization.name }}"
        description: "Test Team 3"
      register: team3

    - name: Create Team 4 in Organization 4
      ansible.platform.team:
        name: "{{ team_name_prefix }}-Team-4"
        organization: "{{ org4.organization.name }}"
        description: "Test Team 3"
      register: team4

    - name: Assert that teams were created
      ansible.builtin.assert:
        that:
          - team1 is changed
          - team2 is changed
          - team3 is changed
          - team4 is changed

    # --------------------------------------------------------------------------
    # Custom Role Setup
    # --------------------------------------------------------------------------
    - name: Create Custom Role
      ansible.platform.role_definition:
        name: "{{ custom_role_name }}"
        description: "Custom role for integration test"
        content_type: "shared.organization"
        permissions:
          - "shared.view_organization"
        state: present
      register: custom_role

    # 1. Assign Org Admin role to Team1 on Org1 (Global role can't be assigned)
    - name: Assign Org Admin to Team1 on Org1
      ansible.platform.role_team_assignment:
        assignment_objects:
          - name: "{{ org1.organization.name }}"
            type: "organizations"
        role_definition: Organization Admin
        team: "{{ team1.team.id }}"
      register: org_admin_assignment_1
      ignore_errors: true  # this may fail depending on AAP limitations

    # 2. Assign Platform role to Team3 on Org3 (Global role can't be assigned)
    - name: Assign Platform Auditor to Team1 on Org1
      ansible.platform.role_team_assignment:
        assignment_objects:
          - name: "{{ org1.organization.name }}"
            type: "organizations"
        role_definition: Platform Auditor
        team: "{{ team1.name }}"
      register: org_admin_assignment_2
      ignore_errors: true  # this may fail depending on AAP limitations

    # 3. Assign Custom Role Assignment Test to Team1 on Org1
    - name: Assign Custom Role to Team1 on Org1
      ansible.platform.role_team_assignment:
        assignment_objects:
          - name: "{{ org1.name }}"
            type: "organizations"
        role_definition: "{{ custom_role_name }}"
        team: "{{ team1.name }}"
        state: present
      register: custom_role_assignment

    # --------------------------------------------------------------------------
    # VERIFICATION: Assert assignment persists using state: exists
    # (works across all three connection modes; no raw URI call needed)
    # --------------------------------------------------------------------------
    - name: Verify role team assignment exists for Team 1 and Custom Role
      ansible.platform.role_team_assignment:
        role_definition: "{{ custom_role_name }}"
        team: "{{ team1.team.name }}"
        assignment_objects:
          - name: "{{ org1.organization.name }}"
            type: "organizations"
        state: exists
      register: rta_state_exists_check

    - name: BUG regression - assert exists key is present and true (multi-object path)
      ansible.builtin.assert:
        that:
          - rta_state_exists_check is not changed
          - rta_state_exists_check.exists | bool
        fail_msg: >-
          REGRESSION: state:exists via assignment_objects does not set
          the 'exists' key. Check result builder in plugins/action/role_team_assignment.py.
        success_msg: "BUG RTA OK: exists={{ rta_state_exists_check.exists }} is present in the result"

    # --------------------------------------------------------------------------
    # Role Deletion: assignment_objects + state absent must delete and
    # report changed (composite list find + delete must receive full per_obj + id).
    # --------------------------------------------------------------------------
    - name: Regression pre-cleanup - team2/org2 custom role assignment absent
      ansible.platform.role_team_assignment:
        role_definition: "{{ custom_role_name }}"
        team: "{{ team2.team.name }}"
        assignment_objects:
          - name: "{{ org2.organization.name }}"
            type: "organizations"
        state: absent
      failed_when: false

    - name: Regression - create team2 assignment on org2 with custom role
      ansible.platform.role_team_assignment:
        role_definition: "{{ custom_role_name }}"
        team: "{{ team2.team.name }}"
        assignment_objects:
          - name: "{{ org2.organization.name }}"
            type: "organizations"
        state: present
      register: rta_delete_bug_create
      failed_when: rta_delete_bug_create.failed or not rta_delete_bug_create.changed

    - name: Regression - delete assignment must report changed
      ansible.platform.role_team_assignment:
        role_definition: "{{ custom_role_name }}"
        team: "{{ team2.team.name }}"
        assignment_objects:
          - name: "{{ org2.organization.name }}"
            type: "organizations"
        state: absent
      register: rta_delete_bug_absent
      failed_when: rta_delete_bug_absent.failed or not rta_delete_bug_absent.changed

    - name: Regression - absent again is idempotent (changed false)
      ansible.platform.role_team_assignment:
        role_definition: "{{ custom_role_name }}"
        team: "{{ team2.team.name }}"
        assignment_objects:
          - name: "{{ org2.organization.name }}"
            type: "organizations"
        state: absent
      register: rta_delete_bug_absent_idempotent
      failed_when: rta_delete_bug_absent_idempotent.failed or rta_delete_bug_absent_idempotent.changed

    - name: Regression - recreate after delete must report changed
      ansible.platform.role_team_assignment:
        role_definition: "{{ custom_role_name }}"
        team: "{{ team2.team.name }}"
        assignment_objects:
          - name: "{{ org2.organization.name }}"
            type: "organizations"
        state: present
      register: rta_delete_bug_recreate
      failed_when: rta_delete_bug_recreate.failed or not rta_delete_bug_recreate.changed

    - name: Regression teardown - remove team2/org2 assignment before global cleanup
      ansible.platform.role_team_assignment:
        role_definition: "{{ custom_role_name }}"
        team: "{{ team2.team.name }}"
        assignment_objects:
          - name: "{{ org2.organization.name }}"
            type: "organizations"
        state: absent
      failed_when: false

    # Once we have role_definition , module available we can uncomment these
    # 3. Assign Org Inventory Admin role to Team2 on Org2
    # - name: Assign Org Inventory Admin to Team2 on Org2
    #   ansible.platform.role_team_assignment:
    #     assignment_objects:
    #       - name: "{{ org1.organization.name }}"
    #         type: "organizations"
    #       - name: "{{ org2.organization.name }}"
    #         type: "organizations"
    #     role_definition: Organization Inventory Admin
    #     team: "{{ team2.name }}"
    #     state: present
    #   register: org_admin_assignment_3

    # - name: Assert Team2 Org Inventory Admin assignment worked
    #   ansible.builtin.assert:
    #     that:
    #       - org_admin_assignment_3 is changed or org_admin_assignment_3 is not failed

    # 4. Idempotency check (should not change)
    # - name: Re-run Org Inventory Admin removal for Team2
    #   ansible.platform.role_team_assignment:
    #     assignment_objects:
    #       - name: "{{ org1.organization.name }}"
    #         type: "organizations"
    #       - name: "{{ org2.organization.name }}"
    #         type: "organizations"
    #     role_definition: Organization Inventory Admin
    #     team: "{{ team2.name }}"
    #     state: present
    #   register: org_admin_assignment_3_check

    # - name: Assert no change on idempotent re-run
    #   ansible.builtin.assert:
    #     that:
    #       - org_admin_assignment_3_check is not changed

    # 5. Assign Org Inventory Admin role to Team2 on Org1 (absent to test delete)
    # - name: Assign Org Credential Admin to Team3 on Org3
    #   ansible.platform.role_team_assignment:
    #     assignment_objects:
    #       - name: "{{ org3.organization.name }}"
    #         type: "organizations"
    #     role_definition: Organization Credential Admin
    #     team: "{{ team3.name }}"
    #     state: present
    #   register: org_admin_assignment_5

    # - name: Assert Org Credential Admin assignment worked
    #   ansible.builtin.assert:
    #     that:
    #       - org_admin_assignment_5 is changed

  always:
    - name: Cleanup role team assignment delete regression (team2/org2/custom role)
      ansible.platform.role_team_assignment:
        role_definition: "{{ custom_role_name }}"
        team: "{{ team2.team.name }}"
        assignment_objects:
          - name: "{{ org2.organization.name }}"
            type: "organizations"
        state: absent
      failed_when: false

    # ----------------------------------------------------------------------
    # Explicit Role Cleanup (Uncomment once role_definition implemented)
    # ----------------------------------------------------------------------
    # - name: Remove Org Inventory Admin assignment from Team2 on Org1,Org2
    #   ansible.platform.role_team_assignment:
    #     assignment_objects:
    #       - name: "{{ org1.organization.name }}"
    #         type: organizations
    #       - name: "{{ org2.organization.name }}"
    #         type: organizations
    #     role_definition: Organization Inventory Admin
    #     team: "{{ team2.name }}"
    #     state: absent

    # - name: Remove Org Inventory Admin assignment from Team2 on Org3
    #   ansible.platform.role_team_assignment:
    #     assignment_objects:
    #       - name: "{{ org3.organization.name }}"
    #         type: organizations
    #     role_definition: Organization Inventory Admin
    #     team: "{{ team3.name }}"
    #     state: absent
    # ----------------------------------------------------------------------
    # Cleanup
    # ----------------------------------------------------------------------
    - name: Delete test teams
      ansible.platform.team:
        name: "{{ item.name }}"
        organization: "{{ item.organization }}"
        state: absent
      loop:
        - { name: "{{ team1.team.name }}", organization: "{{ org1.organization.name }}" }
        - { name: "{{ team2.team.name }}", organization: "{{ org2.organization.name }}" }
        - { name: "{{ team3.team.name }}", organization: "{{ org3.organization.name }}" }
        - { name: "{{ team4.team.name }}", organization: "{{ org4.organization.name }}" }

    - name: Delete test organizations
      ansible.platform.organization:
        name: "{{ item }}"
        state: absent
      loop:
        - "{{ org1.organization.name }}"
        - "{{ org2.organization.name }}"
        - "{{ org3.organization.name }}"
        - "{{ org4.organization.name }}"

    - name: Delete custom role
      ansible.platform.role_definition:
        name: "{{ custom_role_name }}"
        content_type: "shared.organization"
        permissions:
          - "shared.view_organization"
        state: absent
      register: role_delete
      failed_when:
        - role_delete.failed
        - "'Not found' not in role_delete.msg"
        - "'does not exist' not in role_delete.msg"
...
