---
- name: Generate a test ID
  ansible.builtin.set_fact:
    test_id: "{{ lookup('password', '/dev/null chars=ascii_letters length=16') }}"
  when: test_id is not defined

- name: Preset vars
  ansible.builtin.set_fact:
    test_role_name: "GW-Collection-Test-Role-{{ test_id }}"

- name: Run Tests
  module_defaults:
    group/ansible.platform.gateway:
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs | bool }}"

  block:
    # Pre-cleanup: remove leftovers from prior failed runs
    - name: Pre-cleanup role definition
      ansible.platform.role_definition:
        name: "{{ test_role_name }}"
        content_type: shared.organization
        permissions:
          - shared.view_organization
        state: absent
      failed_when: false

    - name: Pre-cleanup renamed role definition
      ansible.platform.role_definition:
        name: "new-{{ test_role_name }}"
        content_type: shared.organization
        permissions:
          - shared.view_organization
        state: absent
      failed_when: false

    # <roles> -------------------
    - name: Create an role with check mode
      ansible.platform.role_definition:
        name: "{{ test_role_name }}"
        description: Grants full inventory access
        content_type: awx.inventory
        permissions:
          - awx.view_inventory
          - awx.change_inventory
      check_mode: true

    - name: Search for the role
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/role_definitions/?name={{ test_role_name | urlencode }}"
        method: GET
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        force_basic_auth: true
        validate_certs: "{{ gateway_validate_certs | default(false) }}"
        status_code: [200]
      delegate_to: localhost
      register: role_search

    - name: Assert that role does not exist
      ansible.builtin.assert:
        that:
          - role_search.json.count == 0
        fail_msg: "role '{{ test_role_name }}' exists in the system!"

    - name: Create Roles
      ansible.platform.role_definition:
        name: "{{ test_role_name }}"
        description: "Has member permission to a single organization"
        content_type: shared.organization
        permissions:
          - shared.view_organization
      register: role

    - name: Assert a creation changes the system
      ansible.builtin.assert:
        that:
          - role is changed

    - name: Recreate an role
      ansible.platform.role_definition:
        name: "{{ test_role_name }}"
        description: "Has member permission to a single organization"
        content_type: shared.organization
        permissions:
          - shared.view_organization
      register: recreate_role

    - name: Assert that a recreate does not change the system
      ansible.builtin.assert:
        that:
          - recreate_role is not changed

    - name: Alter an existing role by ID
      ansible.platform.role_definition:
        name: "{{ role.role_definition.id }}"
        description: "Some updates in role"
        content_type: shared.organization
        permissions:
          - shared.view_organization
      register: role_change

    - name: Assert that an role change changes the system
      ansible.builtin.assert:
        that:
          - role_change is changed

    - name: Rename an role
      ansible.platform.role_definition:
        name: "{{ test_role_name }}"
        new_name: "new-{{ test_role_name }}"
        content_type: shared.organization
        permissions:
          - shared.view_organization
      register: rename_role

    - name: Assert the rename of an role changes the existing item
      ansible.builtin.assert:
        that:
          - rename_role is changed
          - role.role_definition.id == rename_role.role_definition.id

    - name: Delete a non-existent role
      ansible.platform.role_definition:
        name: "{{ test_role_name }}"
        content_type: shared.organization
        permissions:
          - shared.view_organization
        state: absent
      register: role_delete

    - name: Assert that the deletion of a non-existent role does not fail or change the system
      ansible.builtin.assert:
        that:
          role_delete is not changed

    - name: Delete an role
      ansible.platform.role_definition:
        name: "{{ role.role_definition.id }}"
        content_type: shared.organization
        permissions:
          - shared.view_organization
        state: absent
      register: role_delete

    - name: Assert that the deletion of a valid or changes the system
      ansible.builtin.assert:
        that:
          - role_delete is changed

    # </Roless> ------------------

  # <Cleanup>
  always:
    - name: Delete role by original name
      ansible.platform.role_definition:
        name: "{{ test_role_name }}"
        content_type: shared.organization
        permissions:
          - shared.view_organization
        state: absent
      failed_when: false

    - name: Delete role by renamed name
      ansible.platform.role_definition:
        name: "new-{{ test_role_name }}"
        content_type: shared.organization
        permissions:
          - shared.view_organization
        state: absent
      failed_when: false
...
