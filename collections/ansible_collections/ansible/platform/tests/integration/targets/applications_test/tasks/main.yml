---
- name: Generate a test ID
  ansible.builtin.set_fact:
    test_id: "{{ lookup('password', '/dev/null chars=ascii_letters length=16') }}"
  when: test_id is not defined

- name: Preset vars
  ansible.builtin.set_fact:
    gateway_user_default_password: "change-me"
    name_prefix: "GW-Collection-Test-Applications-{{ test_id }}"

- name: Run Test
  module_defaults:
    group/ansible.platform.gateway:
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs | bool }}"

  block:
    # <Organizations> -----------------------------
    - name: Create Organization 1
      ansible.platform.organization:
        name: "{{ name_prefix }}-Organization-1"
      register: org1

    - name: Create Organization 2
      ansible.platform.organization:
        name: "{{ name_prefix }}-Organization-2"
      register: org2
    # </Organizations> ----------------------------

    # <Users> ---------------------------
    - name: Create user 1
      ansible.platform.user:
        username: "{{ name_prefix }}-User-1"
      register: user1

    - name: Create user 2
      ansible.platform.user:
        username: "{{ name_prefix }}-User-2"
      register: user2
    # </Users> --------------------------

    # </Applications> --------------------------
    - name: Create Application 1 with check mode
      ansible.platform.application:
        name: "{{ name_prefix }}-app1"
        organization: "{{ name_prefix }}-Organization-1"
        authorization_grant_type: password
        client_type: public
      check_mode: true

    # Avoid gateway_api lookup here (can crash worker on macOS). Use module state: exists instead.
    - name: Check that Application 1 does not exist
      ansible.platform.application:
        name: "{{ name_prefix }}-app1"
        organization: "{{ name_prefix }}-Organization-1"
        state: exists
      register: app1_search

    - name: Assert that Application 1 does not exist
      ansible.builtin.assert:
        that:
          - not app1_search.exists | default(false)
        fail_msg: "App '{{ name_prefix }}-app1' exists in the system!"

    - name: Create Application 1
      ansible.platform.application:
        name: "{{ name_prefix }}-app1"
        organization: "{{ name_prefix }}-Organization-1"
        authorization_grant_type: password
        client_type: public
      register: app1

    - name: Assert that we created application 1
      ansible.builtin.assert:
        that:
          - app1 is changed

    - name: Recreate Application 1
      ansible.platform.application:
        name: "{{ name_prefix }}-app1"
        organization: "{{ name_prefix }}-Organization-1"
        authorization_grant_type: password
        client_type: public
      register: recreate_app1

    - name: Assert that recreation does not change the system
      ansible.builtin.assert:
        that:
          - recreate_app1 is not changed
          - recreate_app1.application.id == app1.application.id

    - name: Create Application 2
      ansible.platform.application:
        name: "{{ name_prefix }}-app2"
        organization: "{{ org1.organization.id }}"
        authorization_grant_type: authorization-code
        client_type: confidential
        description: Another application
        redirect_uris:
          - "https://tower.com/api/v2/"
          - "https://tower.com/api/v2/teams"
      register: app2

    - name: Assert that we created application 2
      ansible.builtin.assert:
        that:
          - app2 is changed

    - name: Idempotency check — redirect_uris list must not trigger a change on re-run
      ansible.platform.application:
        name: "{{ name_prefix }}-app2"
        organization: "{{ org1.organization.id }}"
        authorization_grant_type: authorization-code
        client_type: confidential
        description: Another application
        redirect_uris:
          - "https://tower.com/api/v2/"
          - "https://tower.com/api/v2/teams"
      register: app2_idem

    - name: Assert redirect_uris list idempotency — changed must be false
      ansible.builtin.assert:
        that:
          - app2_idem is not changed
          - app2_idem.application.id == app2.application.id
        success_msg: "redirect_uris list idempotency OK: changed=false as expected"
        fail_msg: >-
          BUG-APP-01 REGRESSION: redirect_uris list idempotency broken —
          changed=true on re-run with identical redirect_uris list.
          Check _should_update() in plugins/action/application.py.

    - name: Create Application 3
      ansible.platform.application:
        name: "{{ name_prefix }}-app3"
        organization: "{{ org1.organization.id }}"
        authorization_grant_type: password
        client_type: public
        user: "{{ user1.user.username }}"
      register: app3

    - name: Assert that we created application 3
      ansible.builtin.assert:
        that:
          - app3 is changed

    - name: Create Application 4
      ansible.platform.application:
        name: "{{ name_prefix }}-app4"
        organization: "{{ org1.organization.name }}"
        authorization_grant_type: password
        client_type: confidential
        skip_authorization: true
        user: "{{ user1.user.username }}"
      register: app4

    - name: Assert that we created application 4
      ansible.builtin.assert:
        that:
          - app4 is changed

    - name: Idempotency check — organization name string must not trigger a change on re-run
      ansible.platform.application:
        name: "{{ name_prefix }}-app4"
        organization: "{{ org1.organization.name }}"
        authorization_grant_type: password
        client_type: confidential
        skip_authorization: true
        user: "{{ user1.user.username }}"
      register: app4_idem

    - name: Assert organization name-string idempotency — changed must be false
      ansible.builtin.assert:
        that:
          - app4_idem is not changed
          - app4_idem.application.id == app4.application.id
        success_msg: "organization name-string idempotency OK: changed=false as expected"
        fail_msg: >-
          BUG-APP-01 REGRESSION: organization name-string idempotency broken —
          changed=true on re-run when organization is a name string.
          Check _should_update() FK skip in plugins/action/base_action.py.

    - name: Create Application 5
      ansible.platform.application:
        name: "{{ name_prefix }}-app5"
        organization: "{{ org1.organization.id }}"
        authorization_grant_type: password
        client_type: confidential
      register: app5

    - name: Assert that we created application 5
      ansible.builtin.assert:
        that:
          - app5 is changed

    - name: Create Application 6
      ansible.platform.application:
        name: "{{ name_prefix }}-app6"
        organization: "{{ org1.organization.id }}"
        authorization_grant_type: password
        client_type: confidential
        app_url: "https://tower.com"
      register: app6

    - name: Assert that we created application 6
      ansible.builtin.assert:
        that:
          - app6 is changed

    - name: Test exists does not change
      ansible.platform.application:
        name: "{{ app1.application.name }}"
        organization: "{{ org1.organization.id }}"
        state: exists
      register: exists_app1

    - name: Assert that existing does not change the system
      ansible.builtin.assert:
        that:
          - exists_app1 is not changed

    - name: Change application uris
      ansible.platform.application:
        name: "{{ app1.application.name }}"
        organization: "{{ org1.organization.id }}"
        redirect_uris:  # changed
          - "https://tower.com/api/v3/"
          - "https://tower.com/api/v3/teams"
      register: change_app1

    - name: Assert that we changed an existing application
      ansible.builtin.assert:
        that:
          - change_app1 is changed
          - change_app1.application.id == app1.application.id

    - name: Change an application to a user owned application
      ansible.platform.application:
        name: "{{ app2.application.id }}"
        organization: "{{  org1.organization.id }}"
        user: "{{ user1.user.username }}"
      register: change_app2

    - name: Assert that we can change an application to a new user
      ansible.builtin.assert:
        that:
          - change_app2 is changed
          - change_app2.application.id == app2.application.id

    - name: Rename an application
      ansible.platform.application:
        name: "{{ app4.application.name }}"
        new_name: "{{ app4.application.name }}-new"
        organization: "{{ org1.organization.id }}"
      register: rename_app4

    - name: Assert that we can rename an application
      ansible.builtin.assert:
        that:
          - rename_app4 is changed
          - rename_app4.application.id == app4.application.id

    - name: Move an application to a new organization
      ansible.platform.application:
        name: "{{ app5.application.name }}"
        organization: "{{ org1.organization.name }}"
        new_organization: "{{ org2.organization.name }}"
      register: change_app5

    - name: Assert that we can move an application to a new org
      ansible.builtin.assert:
        that:
          - change_app5 is changed
          - change_app5.application.id == app5.application.id

    - name: Change application app_url
      ansible.platform.application:
        name: "{{ name_prefix }}-app6"
        organization: "{{ org1.organization.id }}"
        app_url: https://awx.com
      register: change_app6

    - name: Assert that we changed an existing application
      ansible.builtin.assert:
        that:
          - change_app6 is changed
          - change_app6.application.id == app6.application.id

    - name: Change application app_url (blank out app_url)
      ansible.platform.application:
        name: "{{ name_prefix }}-app6"
        organization: "{{ org1.organization.id }}"
        app_url: ""
      register: change_app6

    - name: Assert that we changed an existing application
      ansible.builtin.assert:
        that:
          - change_app6 is changed
          - change_app6.application.id == app6.application.id

    - name: Delete not existent ID
      ansible.platform.application:
        name: "{{ name_prefix }}-app314159"  # Does not exist
        organization: "{{ org1.organization.id }}"
        state: absent
      register: delete_application

    - name: Assert that deleting a non-existent application does not change the system
      ansible.builtin.assert:
        that:
          - delete_application is not changed

    - name: Delete a real application
      ansible.platform.application:
        name: "{{ app5.application.name }}"
        organization: "{{ org2.organization.name }}"
        state: absent
      register: delete_app5

    - name: Assert that deleting an application causes a change
      ansible.builtin.assert:
        that:
          - delete_app5 is changed

  always:
    - name: Delete Applications in Org1
      ansible.platform.application:
        name: "{{ vars[item].application.id }}"
        organization: "{{ org1.organization.id }}"
        state: absent
      loop:
        - "app1"
        - "app2"
        - "app3"
        - "app4"
        - "app5"
        - "app6"
      when: "item in vars and vars[item].application is defined and 'id' in vars[item].application"

    - name: Delete Applications in Org2
      ansible.platform.application:
        name: "{{ vars[item].application.id }}"
        organization: "{{ org2.organization.id }}"
        state: absent
      loop:
        - "app1"
        - "app2"
        - "app3"
        - "app4"
        - "app5"
        - "app6"
      when: "item in vars and vars[item].application is defined and 'id' in vars[item].application"

    - name: Delete Users
      ansible.platform.user:
        username: "{{ vars[item].user.username }}"
        state: absent
      when: "item in vars and vars[item].user is defined and 'id' in vars[item].user"
      loop:
        - "user1"
        - "user2"

    - name: Delete Organizations
      ansible.platform.organization:
        name: "{{ vars[item].organization.id }}"
        state: absent
      when: "item in vars and vars[item].organization is defined and 'id' in vars[item].organization"
      loop:
        - "org1"
        - "org2"
...
