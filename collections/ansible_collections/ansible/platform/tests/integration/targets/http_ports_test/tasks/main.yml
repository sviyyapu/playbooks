---
- name: Generate a test ID
  ansible.builtin.set_fact:
    test_id: "{{ lookup('password', '/dev/null chars=ascii_letters length=16') }}"
  when: test_id is not defined

- name: Run Test
  module_defaults:
    group/ansible.platform.gateway:
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs | bool }}"

  block:
    # Clean up any leftover ports from previous runs (by number, so we remove ports from any test_id)
    - name: List existing http ports by number (for cleanup)
      ansible.builtin.uri:
        url: "{{ gateway_hostname }}/api/gateway/v1/http_ports/"
        force_basic_auth: true
        url_username: "{{ gateway_username }}"
        url_password: "{{ gateway_password }}"
        validate_certs: "{{ gateway_validate_certs | bool }}"
        method: GET
        return_content: true
      delegate_to: localhost
      register: _http_ports_list

    - name: Ensure test port numbers are absent (cleanup from previous runs)
      ansible.platform.http_port:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ _http_ports_list.json.results | default([]) }}"
      when: item.number is defined and item.number in [65530, 65531, 65532, 65533]

    - name: Set fact when an API port already exists (Gateway allows only one)
      ansible.builtin.set_fact:
        api_port_already_exists: "{{ (_http_ports_list.json.results | default([])) | selectattr('is_api_port', 'equalto', true) | list | length > 0 }}"

    - name: Create http port 1 with check mode
      ansible.platform.http_port:
        name: "{{ test_id }}-Port-65531"
        number: 65531
        use_https: false
      check_mode: true

    # Avoid gateway_api lookup (can crash worker). Use module state: exists instead.
    - name: Check that http port 1 does not exist
      ansible.platform.http_port:
        name: "{{ test_id }}-Port-65531"
        state: exists
      register: http_port1_search

    - name: Assert that http port 1 does not exist
      ansible.builtin.assert:
        that:
          - not (http_port1_search.exists | default(false))
        fail_msg: "http port '{{ test_id }}-Port-65531' exists in the system!"

    - name: Create http port 1
      ansible.platform.http_port:
        name: "{{ test_id }}-Port-65530"
        number: 65530
        use_https: false
      register: http_port1

    - name: Validate we created the port
      ansible.builtin.assert:
        that:
          - http_port1 is changed

    - name: Recreate http port 1
      ansible.platform.http_port:
        name: "{{ test_id }}-Port-65530"
        number: 65530
        use_https: false
      register: recreate_http_port1

    - name: Validate we created the port
      ansible.builtin.assert:
        that:
          - recreate_http_port1 is not changed

    - name: Create http port 2
      ansible.platform.http_port:
        name: "{{ test_id }}-Port-65531"
        number: 65531
        state: present
      register: http_port2

    - name: Validate we created the port
      ansible.builtin.assert:
        that:
          - http_port2 is changed

    - name: Create http port 3
      ansible.platform.http_port:
        name: "{{ test_id }}-Port-65532"
        number: 65532
        use_https: true
      register: http_port3

    - name: Validate we created the port
      ansible.builtin.assert:
        that:
          - http_port3 is changed

    - name: Create http port 4
      ansible.platform.http_port:
        name: "{{ test_id }}-Port-65533"
        number: 65533
      register: http_port4

    - name: Validate we created the port
      ansible.builtin.assert:
        that:
          - http_port4 is changed

    - name: Check existence of a port
      ansible.platform.http_port:
        name: "{{ http_port2.http_port.name }}"
        state: exists
      register: exists_http_port2

    - name: Validate that exists does not change the system
      ansible.builtin.assert:
        that:
          - exists_http_port2 is not changed

    - name: Change a port
      ansible.platform.http_port:
        name: "{{ http_port3.http_port.id }}"
        use_https: false
      register: change_http_port3

    - name: Validate that we did change an existing port
      ansible.builtin.assert:
        that:
          - change_http_port3 is changed
          - change_http_port3.http_port.id == http_port3.http_port.id

    - name: Rename a port
      ansible.platform.http_port:
        name: "{{ http_port4.http_port.id }}"
        new_name: "{{ http_port4.http_port.name }}-New"
      register: rename_http_port4

    - name: Validate that a rename changed an existing http port
      ansible.builtin.assert:
        that:
          - rename_http_port4 is changed
          - rename_http_port4.http_port.id == http_port4.http_port.id

    - name: Delete a non-existent port
      ansible.platform.http_port:
        name: "{{ test_id }}-Port-DNE"
        state: absent
      register: delete

    - name: Assert that delete of non-existent port does not change the system
      ansible.builtin.assert:
        that:
          - delete is not changed

    - name: Delete an existing http port
      ansible.platform.http_port:
        name: "{{ http_port1.http_port.id }}"
        state: absent
      register: delete

    - name: Assert delete of existing http_port changes the system
      ansible.builtin.assert:
        that:
          - delete is changed

    # Skip when Gateway already has an API port (only one allowed per system)
    - name: API port tests (create second API port, remove, make non-API; skip if one exists)
      when: not api_port_already_exists
      block:
        - name: Add API http port
          ansible.platform.http_port:
            name: "Port 44301"
            number: 44301
            use_https: true
            is_api_port: true
            state: present
          register: http_port5

        - name: Remove API http port
          ansible.platform.http_port:
            name: "Port 44301"
            state: absent
          ignore_errors: true  # noqa: ignore-errors
          register: http_port5_remove_result

        - name: Try to make it not an API port
          ansible.platform.http_port:
            name: "Port 44301"
            is_api_port: false
          ignore_errors: true  # noqa: ignore-errors
          register: http_port5_not_api_result

        - name: API Port assertions
          ansible.builtin.assert:
            that:
              - http_port5 is changed
              - http_port5_remove_result is failed
              - http_port5_not_api_result is failed

  always:
    # Individual tasks (not a loop) so each gets its own worker process,
    # avoiding stale multiprocessing proxy errors under ansible-test --requirements.
    - name: Delete http port 1
      ansible.platform.http_port:
        state: absent
        name: "{{ http_port1.http_port.id }}"
      when: "http_port1 is defined and http_port1.http_port is defined and 'id' in http_port1.http_port"
      failed_when: false

    - name: Delete http port 2
      ansible.platform.http_port:
        state: absent
        name: "{{ http_port2.http_port.id }}"
      when: "http_port2 is defined and http_port2.http_port is defined and 'id' in http_port2.http_port"
      failed_when: false

    - name: Delete http port 3
      ansible.platform.http_port:
        state: absent
        name: "{{ http_port3.http_port.id }}"
      when: "http_port3 is defined and http_port3.http_port is defined and 'id' in http_port3.http_port"
      failed_when: false

    - name: Delete http port 4
      ansible.platform.http_port:
        state: absent
        name: "{{ http_port4.http_port.id }}"
      when: "http_port4 is defined and http_port4.http_port is defined and 'id' in http_port4.http_port"
      failed_when: false
...
