[tox]
envlist = ruff, mypy, pydoclint

# This is an Ansible collection, not an installable Python package.
# skip_install prevents tox from invoking the setuptools build backend,
# which would otherwise fail on the flat-layout multi-directory structure.
[testenv]
skip_install = true

[testenv:ruff]
deps = ruff
commands =
    ruff check {posargs:.}
    ruff format --check {posargs:.}

[testenv:mypy]
deps =
    mypy
    types-requests   # stubs for the requests library
    types-PyYAML     # stubs for PyYAML (imported as yaml)
commands =
    mypy {posargs:plugins}

[testenv:pydoclint]
deps = pydoclint
commands =
    # Scope to action plugins — the only dir with consistent type annotations.
    # plugin_utils/connection/modules/etc. have structural issues (mixed type
    # coverage, Ansible boilerplate) that require dedicated annotation work.
    pydoclint {posargs:plugins/action}
