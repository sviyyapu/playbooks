# tox-ansible config for ansible.platform.
# See: https://docs.ansible.com/projects/tox-ansible/
#
# Unit tests are run via pytest directly (see pyproject.toml / conftest.py).
# This file is only used for integration environments:
#   tox -e integration-py3.12-2.17 --conf tox-ansible.ini

[ansible]
# skip =
#     2.9
#     devel

[tox]
ignore_base_python_conflict = true

# Integration: run pytest from the repo ({toxinidir}) so we test LOCAL code.
# ANSIBLE_COLLECTIONS_PATH={toxinidir}/../../.. points to the workspace root so
# Ansible loads ansible.platform from the checked-out repo.
[testenv:integration-py3.10-2.17]
allowlist_externals = bash
commands = bash -c 'cd {toxinidir} && ANSIBLE_COLLECTIONS_PATH={toxinidir}/../../.. python3 -m pytest --rootdir={toxinidir} --ansible-unit-inject-only ./tests/integration'
[testenv:integration-py3.10-2.18]
allowlist_externals = bash
commands = bash -c 'cd {toxinidir} && ANSIBLE_COLLECTIONS_PATH={toxinidir}/../../.. python3 -m pytest --rootdir={toxinidir} --ansible-unit-inject-only ./tests/integration'
